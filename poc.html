r; 3D Printed Shoes - WhaleBerry @CloudBerry; Butterfly Lamp @Darts_3D; Bike Saddle @八宝; Bike Helmet @CloudBerry; Assassin Armor @寺工; Birthday Card @Viktor Losev; Automata by @Ross McSweeney; Birthday Card @popupcardKagisippo; MOCA Pro by @thrutheframe; AirPods Max Case by @设计发射塔; Tesla Model S Plaid by @Mr.Rod; 小米Su7 Ultra Prototype @大匠","title":"Note","0-1":"2 servo motors include the one on the AMS 2 Pro.","8-1":"DynaSense Extruder filament grinding feature limited by filament type.","9-1":"The 600mm/s print speed refering is by using Bambu PLA Matte filament. ","10-1":"Filter Mode for low-temperature printing is optional and is expected to launch as early as Q1 2026.","11-1":"Push notifications require use of Bambu Handy and cloud connectivity.","11-2":"Creator projects are provided for illustrative purposes only. Bambu Lab does not endorse, and disclaims any representations or warranties regarding creator projects, including, without limitation, the safety, marketability, or usability of any 3D printed works based on such projects. See our Terms of Service for more information.","11-3":"The mapping relationship between AMS units and nozzles is one-to-one; filaments in a specific AMS unit can only be printed with the nozzle connected to that AMS unit."},"techTitle":"Bambu Lab H2D - Technical Specifications"},"h2dPro":{"header":{"overview":"Overview","specs":"Specs","faq":"FAQ","contactUs":"Contact Us"},"printer":{"name":"Bambu Lab H2D Pro"},"banner":{"title":"Professional Dual-Nozzle 3D Printing Solution","contactUs":"Contact Us","findReseller":"Find a Reseller"},"chapter":{"service":{"1":{"sectionTitle":"Professional Connection Options","title":"Stable Ethernet Connection, WPA2-Enterprise Authentication Wi-Fi Connection","desc":"The H2D Pro offers the option to connect to your devices through its newly added Ethernet port, ensuring robust network communication in complex environments. Ethernet connectivity can also be used in crowded wireless signal environments. Additionally, the H2D Pro provides WPA2-Enterprise Wi-Fi Authentication (EAP-PEAP/EAP-TLS/EAP-TTLS) and individual physical kill switches for Wi-Fi, meeting stringent network security requirements."},"2":{"sectionTitle":"Enterprise Integration Support","title":"Tailor Solution For Printer Management","desc":"Bambu Lab provides professional support for enterprises to custom-develop efficient printer fleet management tools, meeting their business integration needs. Our expert software R\u0026D team offers full technical assistance to help clients achieve their required customized functionalities. (For more details, please contact your local reseller)"},"3":{"sectionTitle":"Dedicated Service Team","title":"Local response and loaner machines: minimizing your downtime","desc":"Our dedicated weekday support team provides fast response, accurately identifies issues, and offers professional solutions. Local teams are available for on-site service, and for equipment requiring off-site repair, they even can arrange a loaner to ensure your business operations remain seamless."}},"dualNozzle":{"1":{"sectionTitle":"Multi-Material Printing","title":"Flexible and rigid, low cost and exotic materials in one print","desc":"Combine flexible and rigid materials in a single print to create impressive interlocking structures and innovative designs beyond traditional manufacturing. Pairing high-performance materials with standard ones further reduces costs and boosts material efficiency by using premium materials only where necessary."},"2":{"sectionTitle":"Dedicated Support Material","title":"Efficient Support Printing \u0026 Perfectly Smooth Interface","desc":"Print with support is no longer a headache. With H2D’s dual-nozzle setup, one nozzle can be reserved for dedicated support material, allowing secured print and perfect support interface."},"3":{"sectionTitle":"Efficient Multi-Color Printing","title":"Fast and efficient multi-color printing","desc":"Dual-nozzle printing reduces purge cycles in multi-color prints. H2D's smart algorithms optimize filament use, maximizing dual-nozzle efficiency to save time and materials."},"title":"Dual-Nozzle, Enhanced Productivity"},"highTemperature":{"1":{"sectionTitle":"350℃ (662°F) High-Temperature Nozzle","title":"Print engineering filaments better","desc":"Unlock the full potential of your high-temperature engineering filaments with a 350℃ (662°F) nozzle. Experience improved layer bonding when printing demanding materials like PPA-CF, PPS, and PPS-CF at higher temperatures, leading to stronger and more reliable parts."},"2":{"sectionTitle":"65℃ (149°F) Active Chamber Heating \u0026 Cooling","title":"Less failure, stronger prints","desc":"Equipped with a 65°C active chamber heater and adaptive air circulation, the H2D Pro intelligently manages chamber temperature for optimal printing. Active flaps control internal/external airflow based on filament type, preventing low-temp clogs, reducing high-temp warping, improving layer bonding, and fully leveraging each material's strengths."},"3":{"sectionTitle":"Toolhead Enhanced Cooling Fan","title":"Improving high-temperature reliability","desc":"A new high-performance fan integrated into the toolhead front cover effectively cools the extruder and hotend heatsink. This intelligent temperature control mitigates potential clogging and filament jaming in challenging environments, enabling a 3°C increase in the recommended printer operating temperature."},"title":"Professional High-Temperature Printing Solution"},"components":{"1":{"sectionTitle":"Tungsten Carbide Super Durable Nozzle","title":"HRA 90 Tougher nozzle, lower maintainance","desc":"With HRA 90 compared to hardened steel's 74, the H2D Pro's tungsten carbide nozzle provides exceptional wear resistance. This results in a 50% increase in lifespan when printing abrasive, high-performance fiber-reinforced filaments."},"2":{"sectionTitle":"Vision Encoder","title":"50µm ultra-fine motion accuracy","desc":"The H2D Pro comes standard with an ultra-high precision vision encoder plate, utilizing 5µm resolution optical measurement to calibrate toolhead movement. This advanced system ensures consistent and distance-independent 50µm motion accuracy across the entire build area, lay down strong foundation for producing highly accurate prints."},"3":{"sectionTitle":"Heavy Duty Air Filtration","title":"Effectively Filter Particulates And VOCs Generated by 3D Printing","desc":"For optimal air filtration, we've integrated a G3 pre-filter, an H12 HEPA filter, and a premium coconut shell activated carbon filter. This enhanced system effectively minimizes excessive odors and particulates, particularly beneficial when printing in less ventilated spaces."}},"box":{"title":"What In The Box","items":{"1":"Bambu Lab H2D Pro","2":"Bambu Lab AMS 2 Pro","3":"Bambu Lab AMS HT","4":"Vision Encoder Plate","5":"Emergency Stop Button","6":"Textured PEI Build Plate"}}}},"h2c":{"header":{"overview":"Overview","diveIn":"Dive In","showcase":"Showcase","specs":"Specs","faq":"FAQ","buy":"Buy"},"printer":{"name":"Bambu Lab H2C","learnMore":"Learn more"},"banner":{"title":"Uncompromising Multi-Material.","buyNow":"Buy now","watchVideo":"Watch video","bannerAlt":"Bambu Lab H2C Large Format 3D Printer"},"iconSection1":{"title":"Revolutionize How You Print Your Projects"},"models":{"1":{"title":"Paint No More, Print 7 Colors in One-Piece.","name":"Geminaraptor","author":"@FireBird(Sophie)","printing":{"title":"Purge Saving Multi-Color Printing","desc":"Painting intricate models is a thing of the past — the H2C brings your designs to life with six-color printing and a versatile seventh nozzle for support or an additional color. This whole thing is printed in 2 parts. The main raptor is 6-color and the base is another 6-color."}},"2":{"title":"Bring Your Ideas to Life in Full Color with Minimal Waste.","name":"Bambu Lab Racer","author":"@Mr.Rod","printing":{"title":"Purge Saving Multi-Color Printing","desc":"A race car with racing stripes? Yes, you can print it straight out! Forget the hassle of painting or wasting tons of filament."}},"3":{"title":"7 Colors. One Print. No Paint.","name":"Blériot Rider - XI ","author":"@CrazyJN","printing":{"title":"Purge Saving Multi-Color Printing","desc":"An anime-style fighter plane in full color — no paintbrushes, no glue, no fuss.Simply load your filaments and print a flawless one-piece model in no time."}},"4":{"title":"Print Durable Joints — Built Right Into the Parts.","name":"Heavy Second Core Mecha","author":"@Kit Crafters","printing":{"title":"Integrated TPU Joints for Multi-Color Parts","desc":"Print durable TPU ball joints for your robot models — flexible, long-lasting, and built for endless motion."},"materials":{"1":{"name":"TPU for AMS","desc":"Joints"},"2":{"name":"PLA Matte","desc":"Main Body"}}},"5":{"title":"No More Assembly — Print Multi-Material Parts in One Piece.","name":"Aero Mobius Drone Frame","author":"@极尘悦","printing":{"title":"Purge Saving Multi-Material Printing","desc":"With the H2C, you can print up to seven different materials in a single run — no nozzle purging required. Combine multiple material properties in one seamless structure and take integrated design to a whole new level."},"materials":{"1":{"name":"PA6-GF","desc":"Structural rigidity"},"2":{"name":"TPU for AMS","desc":"Impact absorbing"},"3":{"name":"PC FR","desc":"Fire Retardent"}}},"6":{"title":"Bring Color to Flexible Prints.","name":"Multi-Color Sneaker","author":"@CloudBerry","printing":{"title":"Multi-Color TPU Printing","desc":"Bring color and creativity to 3D-printed footwear.With the H2C, you can blend TPU 90A and TPU for AMS to produce multi-color, flexible sneakers that stand out."},"materials":{"1":{"name":"TPU 90A","desc":"Main Body"},"2":{"name":"TPU for AMS","desc":"Colorway \u0026 Torsional Rigidity"}}},"purgeWaste":"Purge and Prime Tower Waste","printTime":"Print Time"},"whatVortek":{"chapterTitle":"Vortek Hotend Change System","cards":{"1":{"title":"Multi-Material Printing with Minimal Purge Waste","desc":"In traditional single-nozzle multi-material printing, purging is needed to clear leftover material between filament changes.Vortek changes that with an intelligent hotend-swapping system that replaces the entire hotend — delivering faster, cleaner prints with minimal waste."},"2":{"title":"Fully Automatic Filament Change","desc":"The Vortek system works seamlessly with our highly reliable AMS (Automatic Material System), making the entire filament change process fully automatic — no need to manually load each filament into the toolhead."},"3":{"title":"Always Delivering the Most Efficient Combination","desc":"The Vortek system can store filament information in the hotend’s memory, ensuring the correct filament is matched to each hotend. If you are printing with more than seven filament types, the system can calculate the optimal combination to minimize purge waste."}}},"whyVortek":{"chapterTitle":"Why Vortek?","cards":{"1":{"title":"Small Form Factor, More Filaments","desc":"Because only the hotend is swapped, the system can house up to six replaceable hotends without significantly reducing the build volume.That means more materials, more colors, and more possibilities — all in one print."},"2":{"title":"8-Second Induction Heating","desc":"Our industry-leading induction heating technology brings the nozzle to temperature in 8-sec, significantly reducing the preheating time for each material swap compared to traditional methods."},"3":{"title":"Contactless Design For Reliability","desc":"Our high standards for reliability led us to move away from contact-based metal pins, which are prone to oxidation and unstable connections.We developed a contactless solution that ensures a stable, high-frequency connection — the foundation for precise temperature control and intelligent hotend sync."},"4":{"title":"Enclosed for High-Performance Printing","desc":"With its seamless enclosure and adaptive airflow system, the H2C maintains a stable chamber temperature for high-performance materials and filters the air to keep your workspace clean and safe."},"5":{"title":"Colors Are No Longer Limited By How Many Toolheads You Have","desc":"Unlike traditional toolchanger printers that limit color count by the number of toolheads, the H2C supports up to 24 materials in a single print through parallel-connected AMS units. Its intelligent algorithm optimizes filament-to-hotend allocation to minimize purge waste while delivering outstanding multi-color and multi-material results."},"6":{"title":"Fully Automatic Nozzle Offset Calibration","desc":"Our inductive nozzle offset calibration is fully automated — no manual steps, no calibration plates, no extra setup. In just a few minutes, the H2C precisely calibrates nozzle offset to within 25 microns.*"},"7":{"title":"Dedicated Hotends for Specific Filaments","desc":"The H2C's Vortek system lets you dedicate one of its six interchangeable hotends to specific filaments — a game-changer for valuable engineering materials.This ensures superior consistency and reliability across prints. Each hotend can even automatically store filament information, so the next time you load that material, it's instantly matched to the correct hotend."}}},"iconSection2":{"title":"Not A Toy, A Serious Production Powerhouse"},"chapters":{"1":{"title":"Superior Print Quality, All Times","sections":{"1":{"title":"Better High-Speed Reliability \u0026 Real-Time Error Detection.","desc":"The PMSM servo extruder delivers up to 10 kg of maximum extrusion force—70% more than stepper motor—dramatically improves high-flowrate extrusion stability. Our proprietary servo architecture samples resistance and position at 20 kHz, actively detecting filament grinding and clogs in real time."},"2":{"title":"50µm Ultra-Fine Motion Accuracy*","desc":"With its Vision Encoder, the H2C achieves a distance-independent motion accuracy of less than 50 μm—thinner than human hair. The system automatically compensates for any mechanical drift during calibration, ensuring consistent precision and peak performance over time.*"},"3":{"title":"Smooth Surface, Sharp Edges","desc":"The H2C leverages both the servo motor on the extruder and the high-resolution eddy current sensors on the nozzle to sense extrusion dynamics. This enables precise extrusion control and automatic calibration of Pressure Advance (PA) parameters for each filament, resulting in smoother surfaces and cleaner, sharper edges.","on":"ON","off":"OFF"}}},"2":{"title":"Engineering Materials Ready","sections":{"1":{"title":"Unleash The Full Potential of High-Performance Materials","desc":"All seven nozzles in the system can reach a maximum temperature of 350 °C, allowing you to print with our entire filament lineup using any nozzle you choose."},"2":{"title":"65 °C Active Heated Chamber","desc":"The H2C's 65 °C actively heated chamber minimizes warping and deformation while enhancing layer adhesion for high-performance, high-temperature filaments."},"3":{"title":"Best-In-Class Air Filtration","desc":"The H2C's three-stage filtration system is essential for printing with engineering filaments. This powerful combination of a G3 pre-filter, an H12 HEPA filter, and a coconut shell activated carbon filter effectively minimizes the odors and harmful particulates often released by engineering materials."}}},"3":{"title":"AI-Powered Simplicity","sections":{"1":{"title":"Comprehensive Print Monitoring","desc":"The H2C is equipped with an array of 59 sensors* and a quad-camera computer vision system, all orchestrated by our proprietary neural algorithm. During printing, this system delivers intelligent, real-time diagnostics that can detect even the most subtle print anomalies as they happen. You don't have to be an expert to solve problems—your printer does the job for you."},"2":{"title":"Nozzle Camera","desc":"The H2C features an AI-backed nozzle camera with macro lens. This intelligent monitoring system continuously tracks extrusion patterns, immediately detecting material accumulation, filament deviations, and extrusion failures.","tabs":{"1":"Spaghetti","2":"Nozzle Clumping","3":"Air Printing"}},"3":{"title":"Pre-Flight Checklist","desc":"Before each print, the H2C's vision system runs a full pre-flight inspection — scanning the build surface for debris and confirming your print start settings. Everything is verified automatically, so every print starts perfectly."}}},"4":{"title":"Safety, Checked!","sections":{"1":{"title":"Fire-Retardant Construction","desc":"The H2C's chamber is constructed entirely with flame-retardant material, providing robust, passive fire safety protection across the entire enclosure."},"2":{"title":"Multi-Sensor Closed-Loop Temperature Control","desc":"The H2C utilizes a sophisticated closed-loop temperature control system for all heating components. By constantly cross-referencing real-time data from multiple sensors, the system ensures stable, precise thermal management, allowing the device to run efficiently and consistently within optimal temperature ranges."},"3":{"title":"Flexible Network Security \u0026 Connectivity","desc":"The H2C offers convenient cloud connectivity for remote control from any device.For security-sensitive applications, it also provides full offline functionality, ensuring complete physical isolation. Users can operate the printer, send files, and update firmware without an internet connection.For advanced users, Developer Mode enables MQTT port access for integrating third-party components and software.*"}}}},"note":{"1":"* All the demonstrated print time \u0026 purge waste data are calculated results by Bambu Studio.","2":"* The advertised Vortek features \u0026 advantages are based on fully utilizing 6 induction hotends of same diameter and corresponding AMS units.","3":"* All product data for the H2C is based on Bambu Lab’s internal testing. Actual results may vary due to individual product differences, user habits, and environmental conditions. Please refer to actual usage for reference.","4":"* The optional Vision Encoder is required for Motion Accuracy Enhancement.","5":"* Auto Holes-contour Compensation must be enabled in Bambu Studio, and designated Bambu filament must be used.","6":"* DynaSense Extruder filament grinding feature limited by filament type.","7":"* \"59 sensors\" is refer to fully equipped H2C Laser Edition with Bird's Eye camera and 6 induction hotends.","8":"* High-flow Hotends are optional equipments, buy at official store.","9":"* Due to safety protocol, Developer mode cannot be enabled when using Laser and Cutting functions.","10":"* Push notifications require use of Bambu Handy and cloud connectivity.","11":"* Creator projects are provided for illustrative purposes only. Bambu Lab does not endorse, and disclaims any representations or warranties regarding creator projects, including, without limitation, the safety, marketability, or usability of any 3D printed works based on such projects. See our Terms of Service for more information.","12":"* The 8-second heating time for induction hotend is based on Bambu PLA Basic printing temperature.","13":"* The “no purging” claim does not include the initial purge required when loading a brand-new filament into a hotend.","14":"* The fire-retardant chamber is made using UL94 V-0 grade materials.","15":"* All induction hotends come with a voluntary one-time replacement within 2 years. For details, please refer to the policy page.","16":"* Big thanks to everyone who created these amazing projects: Geminaraptor by @FireBird(Sophie); Bambu Lab Racer by @Mr.Rod; Blériot Rider - XI by @CrazyJN; Heavy Second Core Mecha by @Kit Crafters; Aero Mobius Drone Frame by @极尘悦; Multi-color Sneaker by @CloudBerry; Gridfinity Anatomical Kidney by @Azrael; Plant Cell by @suezou; EV Charger by @Bambu Lab.","title":"Note:"},"showcase":{"model":{"title":"H2C Innovative Prints","desc":"Fully unlock the potential of \u003ckeywords\u003emulti-color, multi-material\u003c/keywords\u003e printing — the H2C revolutionizes how you approach your 3D printing projects.\nMore colors, more integration — welcome to the new era of \u003ckeywords\u003epersonal manufacturing\u003c/keywords\u003e.","download":"Download","models":{"1":{"name":"GeminaRaptor by @FireBird(Sophie)"},"2":{"name":"Aero Mobius Drone by @极尘悦"},"3":{"name":"Heavy Second Core Mecha by @Kit Crafters"},"4":{"name":"Blériot Rider - XI by @CrazyJN"},"5":{"name":"Bambu Lab Racer by @Mr.Rod"}}}}},"p2s":{"header":{"overview":"Overview","diveIn":"Dive In","showcase":"Showcase","specs":"Specs","faq":"FAQ","buy":"Buy"},"printer":{"name":"Bambu Lab P2S"},"banner":{"title":"The Icon, Redefined.","buyNow":"Buy now","watchVideo":"Watch video","imgAlt":"Bambu Lab P2S Multi Filament 3D Printer"},"typingSection":{"title":"The Icon, Redefined.","desc1":"The iconic \u003ckeywords\u003eBambu Lab P1S\u003c/keywords\u003e revolutionized the 3D printing landscape. Its \u003ckeywords\u003espeed, reliability, and value\u003c/keywords\u003e quickly became the default choice for print farms and enthusiasts, creating the \u003ckeywords\u003elargest wave of popularity\u003c/keywords\u003e in the industry's history.","desc2":"Building on that solid foundation, the evolved \u003ckeywords\u003eP2S\u003c/keywords\u003e now features Bambu Lab's \u003ckeywords\u003e2nd-Gen technologies\u003c/keywords\u003e. It offers a user experience polished to the finest detail and reliably provides the \u003ckeywords\u003etop-quality prints\u003c/keywords\u003e only Bambu Lab can deliver."},"swiperSections":{"user":{"title":"What Makes the P Series Iconic?","cards":{"1":{"user":"Califryburger","desc":"\"I've been running P-series printers since the beta. The Bambu ecosystem feels like the Apple of 3D printing, with the printer, slicer, app, and cloud all working seamlessly. This lets me iterate faster and keep material costs down. My P1S setup and other P-series machines have been rock-solid for two and a half years, still running like day one.\""},"2":{"user":"The Duty Printer","desc":"\"It shouldn't have worked, but it did! Mostly. Me being a moron, I forgot to support the MASSIVE bridge at the top. But the ole P1S just did it anyway! 280mm X 225mm frame with a 1mm width edge contacting the build plate.\""},"3":{"user":"War_Poodle","desc":"\"Since getting my P1S, I've been shocked by how easy it is to try new materials. My sister jokingly sent me a Crocs STL. I tried printing it with generic TPU, no adjustments needed. Twelve hours later, she's wearing a printed Crocs, claiming it's 'more comfortable than a real Crocs.' It's amazing how simple it was to go from an idea to a wearable print!\""},"4":{"user":"TaterTotterer1","desc":"\"I've been running six Bambu Lab P1S printers for a few years now and they've been rock solid. They're easy to maintain and the print quality is always beautiful. I've been really impressed with how consistent they are hour after hour, print after print. For me, reliability is important, and these machines deliver every time.\""},"5":{"user":"DerangedKangaru","desc":"\"Well, today, my kid decided to tip over my workbench, and sent my P1S and AMS flying across the garage. The glass shattered everywhere, the front screen was destroyed, and the printer and AMS looked like they got hit by an RPG. I put the printer back on the workbench, plugged it in, and sent a print over to see how bad the damage was. Flawless, no issues with printing. I am truly amazed at the engineering of the P1S.\""}}},"media":{"cards":{"1":{"desc":"\"Bambu Lab is at it again, producing a near-perfect printer that impressed us with its speed, quality and ability to handle a vast array of materials.\""},"2":{"desc":"\"The Bambu Lab P1S is \u003ckeywords\u003ean easy recommendation for a lot of different situations\u003c/keywords\u003e. For beginners, it's a streamlined experience that \u003ckeywords\u003erequires little effort or prior knowledge from users to achieve great results\u003c/keywords\u003e. For more experienced makers, it's a reliable machine that requires little input when you need a high-quality print quickly.\""},"3":{"desc":"\"All things considered, the combination of \u003ckeywords\u003espeed, quality, ease of use, and price point\u003c/keywords\u003e make the Bambu Lab P1S a \u003ckeywords\u003ehighly recommended printer for anyone\u003c/keywords\u003e in the market.\""},"4":{"desc":"\"Right from unpacking, it's clear that \u003ckeywords\u003ethis printer has been meticulously crafted\u003c/keywords\u003e, from design to protection during transport. The Bambu Lab P1S represents \u003ckeywords\u003eexcellent value for money\u003c/keywords\u003e. Its competitive price, combined with solid performance and well-designed features, make it an attractive option for 3D printing enthusiasts.\""}}},"perfection":{"title":"Perfection, Detail by Detail.","desc":"The P2S features numerous refinements that enhance the user experience. While these incremental improvements may not be immediately apparent, they embody the level of perfection Bambu Lab constantly pursues.","cards":{"1":{"title":"Built-in 2-in-1 Buffer (equipped with AMS combo)","desc":"Effortlessly switch between your AMS and external filament spools for maximum flexibility."},"2":{"title":"Flat Base Plate","desc":"The smooth, flat surface makes it simple to swipe out all residue, keeping your printer clean."},"3":{"title":"Integrated Lift Handles","desc":"Designed for safe and easy transport, these sturdy handles protect your hands and provide a secure grip when moving the printer."},"4":{"title":"Shatter-Safe Front Glass","desc":"Engineered for safety, the front glass is protected by a film built in case of shattering, protecting you and your workspace."}}}},"sections":{"1":{"title":"The User Experience As Good As A Smartphone.","desc":"The P2S features a fully upgraded \u003ckeywords\u003etouchscreen\u003c/keywords\u003e and a \u003ckeywords\u003epowerful processor\u003c/keywords\u003e, running our new intuitive \u003ckeywords\u003esecond-generation UI\u003c/keywords\u003e. Enjoy smoother interactions, richer graphics, and clearer step-by-step instructions.","mainFeatures":{"1":"5-inch Touch Screen","2":"2nd-Gen UI"}},"2":{"title":"70% More Extrusion Force  \u0026 Real-Time Error Detection.","desc":"The \u003ckeywords\u003ePMSM\u003c/keywords\u003e servo extruder delivers up to \u003ckeywords\u003e8.5 kg\u003c/keywords\u003e of maximum extrusion force—\u003ckeywords\u003e70% more\u003c/keywords\u003e than its predecessor—dramatically improves high-flowrate \u003ckeywords\u003eextrusion stability\u003c/keywords\u003e. Our proprietary servo architecture samples resistance and position at \u003ckeywords\u003e20 kHz\u003c/keywords\u003e, actively detecting filament grinding and clogs in real time.","mainFeatures":{"1":"PMSM Servo Architecture","2":"DynaSense Extruder"}},"3":{"title":"Print Smooth At Every Corner, Always.","desc":"The P2S uses a high-resolution, high-frequency \u003ckeywords\u003eeddy current sensor\u003c/keywords\u003e to calibrate flow dynamics. Intelligent algorithms actively adjust the \u003ckeywords\u003eflow rate\u003c/keywords\u003e based on these readings, provide precise, consistent extrusion across every layer and corner.","mainFeatures":{"1":"Active Flowrate Compensation","2":"Eddy Current Pressure Sensor"}},"4":{"sectionTitle":"Adaptive Airflow System","title":"Perfect Overhang No Matter the Filament or Temperature.","desc":"Unlike traditional cooling systems that recirculate hot air, the P2S's Adaptive Airflow System draws in \u003ckeywords\u003ecool air\u003c/keywords\u003e directly from \u003ckeywords\u003eoutside the chamber\u003c/keywords\u003e. This significantly improves \u003ckeywords\u003ecooling efficiency\u003c/keywords\u003e, letting you confidently print low-temperature filaments with the \u003ckeywords\u003edoor closed\u003c/keywords\u003e—without worrying about overhang quality or nozzle clogs.","mainFeatures":{"1":"Cold-Air Intake","2":"Cooling Mode"}},"5":{"sectionTitle":"Adaptive Airflow System","title":"50°C Chamber Ready For Engineering-Grade Filaments.","desc":"The P2S features a \u003ckeywords\u003eflap-controlled\u003c/keywords\u003e Adaptive Airflow System that efficiently \u003ckeywords\u003eseals heat\u003c/keywords\u003e within the chamber while actively filtering the internal air through a high-performance \u003ckeywords\u003ecarbon filter\u003c/keywords\u003e. This allows you to confidently print demanding engineering filaments prone to warping, all while maintaining clean, \u003ckeywords\u003esafe air quality\u003c/keywords\u003e in your workspace.","mainFeatures":{"1":"Heat Preservation","2":"Carbon Filter"}},"6":{"title":"Peace Of Mind, Everytime You Print.","desc":"The P2S introduces advanced \u003ckeywords\u003eAI computer vision\u003c/keywords\u003e that actively detects common \u003ckeywords\u003eprinting issues\u003c/keywords\u003e such as spaghetti, nozzle blobbing. It also checks your print start settings, ensuring a safe and accurate start to every print job.","mainFeatures":{"1":"AI Error Detection","2":"2 TOPS NPU"},"tabs":{"1":"AI Detection","2":"Start Check","3":"Spaghetti","4":"Nozzle Clumping","5":"Purge Chute Jam"}},"7":{"title":"30-Second Nozzle Swap.","desc":"The P2S features a \u003ckeywords\u003equick-swap hotend\u003c/keywords\u003e design with a simple \u003ckeywords\u003eone-clip\u003c/keywords\u003e mechanism that releases the entire nozzle and heatsink assembly—\u003ckeywords\u003eno wiring disconnection\u003c/keywords\u003e required. This drastically reduces nozzle change time and eliminates the risk of wiring errors.","mainFeatures":{"1":"Quick Swap Hotend","2":"1-Clip Design"}},"8":{"title":"No-Lag Liveview \u0026 High-Quality Timelapse.","desc":"Enhanced LED lighting dramatically improves the \u003ckeywords\u003eclarity\u003c/keywords\u003e of your liveview video and timelapses. Paired with a \u003ckeywords\u003ehigh-frame-rate camera \u0026 Dual-band Wi-Fi\u003c/keywords\u003e, you can comfortably monitor your printer remotely and capture \u003ckeywords\u003ebeautifully illuminated\u003c/keywords\u003e timelapses perfect for sharing on social media.","mainFeatures":{"1":"\"Stage\" Lighting","2":"1080P High-Rate Camera"}},"9":{"title":"Reliable for Fiber-Reinforced Material Printing.","desc":"P2S's extrusion system and nozzle are crafted from \u003ckeywords\u003ehardened steel\u003c/keywords\u003e, offering exceptional \u003ckeywords\u003edurability\u003c/keywords\u003e and \u003ckeywords\u003ewear resistance\u003c/keywords\u003e. Designed specifically for stable, long-term printing of \u003ckeywords\u003ehigh-performance fiber-reinforced\u003c/keywords\u003e materials.","mainFeatures":{"1":"Hardened Steel Nozzle","2":"Hardened Steel Extruder Gear"}},"10":{"sectionTitle":"AMS 2 Pro","title":"Multi-Color Printing \u0026 Filament Drying, All in One Box.","desc":"Experience our \u003ckeywords\u003emost reliable multi-color\u003c/keywords\u003e printing system yet. The AMS 2 Pro features an enhanced design for a better user experience and, crucially, introduces long-awaited \u003ckeywords\u003efilament drying\u003c/keywords\u003e. A pioneering \u003ckeywords\u003eactive venting system\u003c/keywords\u003e dries filament \u003ckeywords\u003e30% faster\u003c/keywords\u003e than sealed heating, maintaining low humidity for superior storage and print quality.","mainFeatures":{"1":"Auto Venting Filament Drying","2":"Multi-Color Printing"}},"11":{"title":"Over A Million High-Quality Models For You to Print.","cards":{"1":{"sectionTitle":"MakerWorld","title":"Over a Million Models at Your Fingertips","desc":"On \u003ckeywords\u003eMakerWorld\u003c/keywords\u003e, you'll find an endless supply of great models, all ready for your P2S. With \u003ckeywords\u003eseamless integration\u003c/keywords\u003e, you can skip the hassle of figuring out settings or slicing. The perfect print profiles for your specific printer and filaments are already in place. Simply \u003ckeywords\u003ehit print and get started!\u003c/keywords\u003e This kind of effortless printing is standard on MakerWorld, so you'll always have something new to try, and your printer can keep busy!"},"2":{"sectionTitle":"MakerLab","title":"AI Assisted 3D Modeling Tools, Bring Your Vision to Life","desc":"Transform your favorite artwork into a personalized lightbox, turn a beloved photo into a relief sculpture, or create one-of-a-kind PrintMon figurines from a simple prompt. With Bambu Lab MakerLab, you can \u003ckeywords\u003edesign and customize without any 3D modeling skills\u003c/keywords\u003e. Create a bookmark with your favorite characters, or an organizer tailored to your desk, with the perfect spot for sticky notes. Whatever you envision, you can create. "},"3":{"sectionTitle":"Maker's Supply","title":"Go-To Source for Parts that Bring 3D Prints to Life","desc":"\u003ckeywords\u003eMaker's Supply provides all the non-3D printed hardware you need for your projects, from motors and LEDs to bolts and magnets\u003c/keywords\u003e. Every pre-tested kit precisely matches the Bill of Materials (BOM) for your chosen MakerWorld project. Just print, assemble, and enjoy!"}}},"highlights":{"title":"Highlights","cards":{"1":{"title":"5-inch Refreshed Touchscreen"},"2":{"title":"Cold-Air Cooling"},"3":{"title":"Engineering Filaments Ready"},"4":{"title":"Quick-Swap Nozzle"},"5":{"title":"PMSM Servo Extruder"},"6":{"title":"Silky-Smooth Liveview"},"7":{"title":"Auto Flow Dynamics Calibration"},"8":{"title":"Active Venting Filament Drying"},"9":{"title":"AI Error Detection"}}},"gallery":{"title":"The Icon in Action","desc":"The P2S is the gateway to new lifestyles, giving you the effortless creative power to explore new possibilities. You want it, you get it!","models":{"1":{"name":"SVF1 Race Car"},"2":{"name":"3D Printed Slides"},"3":{"name":"Another Lamp"},"4":{"name":"Thirst Zapper Water Shooter"},"5":{"name":"Pietone Keyboard"}}},"10-1":{"title":"Electromagnetic Air Vent","desc":"Automated venting facilitates dehumidification during drying and airtight sealing for weeks of quality printing.","labels":{"dry":"Dry","moist":"Moist"}},"10-2":{"title":"Faster Multi-Color Printing","desc":"The PMSM feeding motor accelerates filament feeding by 60%, saving an average of 10 minutes for every 100 filament changes.","models":{"1":{"name":"Formula Race Car"},"2":{"name":"Steering Wheel"},"3":{"name":"P51 Mustang"}}}},"note":{"title":"Note","richText":"Big thanks to everyone who created these amazing projects: 911 Turbo by @Mr.Rod; SVF1 by @Ouky1991; Another Lamp by @lautaro.id; 3D printed slides by @CloudBerry; Pietone 3D Printing Keyboard by @Makesenstudio; Thirst Zapper water shooter by @Neebick; Machinist Infinity Cube by @Franken 3D; Minecraft TNT by 星云丿长歌; Formula race car by @SAMPAN棱界复刻; Steering Wheel by @Marconooren; P51 Mustang by @Planes01; House scene by @BambuLab; AM Vantage by @Cormango; A1 Robot by @洞洞脑子研造社; Plant Pot Stratum by @Hplnvent.\nAll product data for the P2S is based on Bambu Lab’s internal testing. Actual results may vary due to individual product differences, user habits, and environmental conditions. Please refer to actual usage for reference.\nCreator projects are provided for illustrative purposes only. Bambu Lab does not endorse, and disclaims any representations or warranties regarding creator projects, including, without limitation, the safety, marketability, or usability of any 3D printed works based on such projects. See our Terms of Service for more information.\nFilament grinding detection on the DynaSense Extruder may vary depending on filament type.\nPush notifications require use of Bambu Handy and cloud connectivity.\nThe claimed performance of P2S is based on testing results under the recommended operation environment on the spec sheet.","store":"\u003ckeywords ding miraculous machine. The speed, the quality, the ease of use, the speed again, the leap in technology and the speed... What did the other manufacturers even do the last five years? It feels like driving a tesla when you're used to horse riding."},"2":{"text":"Received my printer this week and I have a problem with it and wanted to know if anyone else is in the same boat as me. My issue is it works straight out the box with no countless hours lost messing about with the settings and I’ve already gone through 2kg of filament printing models that were near impossible on my old fdm printers. There should be a warning on the box that it’s going to cost a lot of money for more rolls of filament"},"3":{"text":"In my mind, this printer/team has redefined what an off-the-shelf printer is, challenged the current standards, and begun a new level of expectations in the industry."},"4":{"text":"I don't want to screw around with a machine, I went to design and bring those designs to life."},"5":{"text":"I cannot wait to see what this team comes up with next."}}},"customizePrinter":{"title":"拓竹制造，由你创造","desc":"现在，你可以个性化的定制并打印 P1P 的侧板。点击“下载侧板模型样式”按钮，选择已有模型样式开始打印，或点击“下载 P1P 框架模型”按钮，设计属于自己的独一无二侧板。","downloadButton1":"下载侧板模型样式","downloadButton2":"下载 P1P 框架模型","printer":{"1":"印象系列","2":"经典系列","3":"功能系列","4":"艺术系列","1-1":"彩色流火","1-2":"绿意花园","2-1":"静谧冰湖","2-2":"灰色陨石","2-3":"极速幻想","2-4":"荒漠风暴","3-1":"象牙白","3-2":"竹炭黑","4-1":"拓竹-逐光","4-2":"午夜百合"}},"events":{"1":{"title":"\u003c1\u003e圣诞节前即将发售\u003c/1\u003e\u003c2\u003e订阅我们接受最新发售信息。\u003c/2\u003e","desc":"发售当天还可以领取惊喜大礼哦！"},"title":"了解P1P最新动态","seeMore":"了解更多"},"techSpecs":{"title":"技术参数","compare":"比较各款3D打印机","buyNow":"立即购买"},"questions":{"title":"常见问题","learnMore":"了解更多"},"shareContent":{"shareText":"更多讨论，移步官方社区","facebook":"@bambulab3D launches a new 3D printer P1P! Go check it out.","twitter":"@BambulabGlobal launches a new 3D printer P1P! Go check it out. ","weibo":"Bambu Lab发布了新品3D打印机P1P，快来围观！","emailTitle":"Bambu Lab will be launch 调平","title":"告别繁琐的手动校准和调整","desc":"A1 可自动完成各类校准。在每次打印前，它都会自动完成 Z 轴相对高度校准、自动热床调平、全共振频率测量和喷嘴压力校准。"},"3":{"sectionTitle":"自动 Z 轴相对高度","title":"告别“A4 纸调平法”","desc":"A1 利用喷嘴对热床进行探测，以测量绝对 Z 轴偏移。告别手动感知，不用再反复抽拉 A4 纸作为调平参考。"},"4":{"sectionTitle":"自动振动校准","title":"打印前实时校准 X \u0026 Y 双轴共振","desc":"A1 的工具头和 Y 轴搭载了传感器，率先支持打印前实时校准 X 轴和 Y 轴共振，并利用算法补偿。","watchVideo":"观看视频"},"5":{"sectionTitle":"自动流量校准","title":"全自动压力提前校准","desc":"A1 首创基于喷嘴压力的自动流量校准算法，无需绘制任何图案，不必任何手动挑选和匹配，即可自动完成校准。"},"6":{"sectionTitle":"自动皮带张紧","title":"自动监测和调整皮带","desc":"松弛的皮带会导致打印质量下降，A1 可以通过振动频率校准自动检查皮带张力。如果皮带张紧力超出算法可校准的范围，HMS 健康管理系统会通知你启用自动程序，调整皮带张力。"},"7":{"sectionTitle":"自动耗材装载","title":"一键装载/卸载耗材","desc":"无需手动设置，A1 可实现耗材装载/卸载过程的全自动化。"}},"compensation":{"sectionTitle":"主动流量补偿","title":"让每个转角都丝滑流畅","desc":"A1 革新了 3D 打印流量控制技术。在打印准备阶段，机器会利用工具头内集成的高分辨率、高频涡流传感器监测喷嘴内部压力。流量补偿算法即根据测得的数据，主动补偿流速，以保证精准的挤出。"},"highSpeedPrecision":{"sectionTitle":"高速精准","title":"快，稳，准！","desc":"A1 搭载了全金属导轨和框架、喷嘴压力传感器、加速度计和强大的 MCU。在先进运动控制系统的精准控制下，A1 无需使用特殊的 PLA，即可打出完美的 14 分钟小船。"},"intuitiveUI":{"sectionTitle":"直观的 UI 界面","title":"操作像手机一样简单","desc":"A1 搭载了简洁的全新 UI 系统，指引流程更加人性化。无需成为 3D 打印专家，即可玩转 A1。"},"worryFreePrinting":{"sectionTitle":"无忧打印","title":"启动！然后做自己的事情去吧","desc":"拓竹以稳定的打印体验闻名，赢得了用户的广泛赞誉。放心开始打印，然后就去做自己的事情吧。","comment":{"1":"A1 mini 真的很棒，打印过程安静，打出来的东西又快又好。我用它打印了拓竹模型库里的圣诞小木屋，总共 9 盘花了 19 个小时，没毛病！细微的小细节也打的非常精致。","2":"终于打完了一个大模型！基本是用 A1 mini 来完成的因为我的 P1P 正在升级成 P1S 哈哈哈！打印质量很棒，整个过程没有一点毛病，效果让我很满意。因为是没有缩小打印的全尺寸模型所以组装起来真的很大！我需要专门腾个柜子来放这个大宝贝了！","author1":"——来自脸书群组用户","author2":"——脸书群组用户"}},"makerWorld":{"sectionTitle":"MakerWorld","title":"支持一键打印","desc":"MakerWorld，下一代模型资源平台，已经开启公测。用户可通过 Bambu Handy 直接挑选模型并一键打印。除了 MakerWorld 带来的新功能，你也可以用 Bambu Studio 和 Bambu Handy，随时随地管理你的打印机。","learnMore":"了解更多"},"printSilently":{"sectionTitle":"安静打印","title":"电机主动降噪技术","desc":"主动降噪及静音模式可使打印机工作噪声水平低于 48 dB。在打印机工作间小憩，也不用怕被打扰。"},"swiftMaintenance":{"1":{"sectionTitle":"快速维护","title":"快拆热端","desc":"全新快拆热端结构设计，轻轻打开热端锁扣，即可磁吸装取。"}},"privacy":{"1":{"sectionTitle":"隐私模式","title":"可选仅局域网模式","desc":"使用局域网模式可远程控制 / 实时查看打印机，并将打印任务发送到你的 A1，而无需通过云端通信。"},"2":{"sectionTitle":"隐私保护","title":"相机隐私遮罩","desc":"可以手动关闭遮罩来禁用相机。"}},"reliability":{"sectionTitle":"可靠性","title":"全金属框架、轴承和轨道","desc":"我们不惜成本，为 A1 装配了更可靠的全金属的线轨和导轮，以及有外壳保护的驱动系统。从首次使用开始，卓越品质，始终如一。"},"cardSection":{"1":{"title":"全金属导轨","desc":"轨道是 3D 打印机中影响使用寿命和精度的最重要因素。在打印过程中，轨道需要保证系统的刚度，且时刻承受着高速运动带来的磨损。A1 采用了全金属的运动导轨，在 X 轴使用了高质量的直线导轨， 并在 Y 轴使用了全金属导轮。这套导轨系统保证了用户不需要频繁调整 A1 的运动组件，只需要定期的润滑就能保证打印机的精度和寿命。"},"2":{"title":"主动振动补偿","desc":"拓竹的主动振动补偿与其他固件中的 Input Shaping 类似，是高速打印的关键。 为了补偿打印机的振动，控制系统需要了解系统的振动特性，如所有轴的固有频率和振幅。 你可以在打印机生产时就固定一个参数来进行补偿，但实际上，这些参数可能会由于环境温度波动、皮带张力变化、甚至打印板质量变化而发生漂移。 为了保证最佳参数以实现卓越的打印质量，我们在工具头和热床上安装了传感器，以便在每次打印之前测量 X 和 Y 轴的相关参数。"},"3":{"title":"全方位进料监测","desc":"众所周知，一次堵头或缠料就可以毁掉整个精美的打印件。以往的断料监测往往只能覆盖很少一部分的故障场景。A1 和 AMS lite 上加入了一套完整的耗材监测系统，包括工具头上的缠料监测传感器，断料监测传感器，喷嘴压力传感器，以及 AMS lite 上的耗材里程计。这些传感器配合先进的算法，能够及时感知诸多潜在的问题，包括耗材打结、断料、挤出机空转等。"},"4":{"title":"RFID 技术","desc":"AMS lite 适配市面上的大多数耗材。当使用拓竹官方耗材时，AMS lite 会利用 RFID 识别技术检测使用的耗材，并自动为其应用恰当配置。同时，它让你能够远程监控耗材的使用。"},"5":{"title":"自动调平","desc":"A1 利用喷嘴作为探针，测量喷嘴与热床间的绝对距离。实现全自动热床调平，无需手动调整。"},"6":{"title":"主动流量补偿","desc":"与 XYZ 轴的线性运动和牛顿运动不同，熔融塑料的粘性流动是非牛顿流体的。在高加速度下，挤出机推入热端的耗材量不一定等于从喷嘴流出的耗材量，这种差异可能导致膨胀的拐角和速度变化带来的伪影。这就是主动流量补偿发挥作用的地方。它有助于预测和调整熔融塑料的流量，促进更准确的挤出。以前，我们用加速度打印直线，并测量线的宽度来校准补偿参数——这一过程很耗时，而且浪费了构建板上的空间。在 A1 中，我们采用了一种新的方法来测量喷嘴压力，使我们能够在每次打印前直接获得必要的参数，从而节省时间并保留构建板空间。"},"7":{"title":"电机主动降噪","desc":"步进电机在高速运动时往往会产生更大的噪音。我们通过电机驱动将特定的高频微动注入电机来主动降噪，这样只要了解每个电机的详细声纹特征，就可以消除大部分噪音。针对每台电机的独特“声纹”，A1 会利用传感器和算法校准每个驱动电机之间的微小差异，更高效地消减电机噪音。"},"8":{"title":"实时监看","desc":"使用 Bambu Handy（移动端 APP）或 Bambu Studio 操控或监看你的 A1。即使不在现场，也能远程掌控全场。"}},"highlightOverview":{"title":"亮点概览","card":{"1":{"title":"AMS lite","desc":"多色打印"},"2":{"title":"全自动校准 ","desc":"无需手动调整"},"3":{"title":"主动流量校准","desc":"处处丝滑"},"4":{"title":"高速也精准","desc":"10000 mm/s² 加速度"},"5":{"title":"安静打印","desc":"工作噪声低于 48 分贝"},"6":{"title":"可靠性","desc":"拓竹质量，值得信赖"},"7":{"title":"MakerWorl liable. Precise. Fun.\""}},"printSilently":{"desc":"主动降噪及静音模式可使打印机工作噪声水平低于 48 dB。在打印机工作间小憩，也不用怕被打扰。"},"privacy":{"1":{"desc":"使用局域网模式可远程控制 / 实时查看打印机，并将打印任务发送到你的 A1 mini，而无需通过云端通信。"}},"reliability":{"desc":"我们不惜成本，为 A1 mini 装配了更可靠的全金属的线轨和导轮，以及有外壳保护的驱动系统。从首次使用开始，卓越品质，始终如一。"},"cardSection":{"1":{"title":"全金属线性轨道","desc":"轨道是 3D 打印机中影响使用寿命和精度的最重要因素。在打印过程中，轨道需要保证系统的刚度，且时刻承受着高速运动带来的磨损。A1 mini 采用了全金属的运动导轨，在 X 轴和 Z 轴使用了高质量的直线导轨， 并在 Y 轴使用了全金属导轮。这套导轨系统保证了用户不需要频繁调整 A1 mini 的运动组件，只需要定期的润滑就能保证打印机的精度和寿命。"},"2":{"desc":"拓竹的主动振动补偿与其他固件中的 Input Shaping 类似，是高速打印的关键。 为了补偿打印机的振动，控制系统需要了解系统的振动特性，如所有轴的固有频率和振幅。 你可以在打印机生产时就固定一个参数来进行补偿，但实际上，这些参数可能会由于环境温度波动、皮带张力变化、甚至打印板质量变化而发生漂移。 为了保证最佳参数以实现卓越的打印质量，我们在工具头和热床上安装了传感器，以便在每次打印之前测量 X 和 Y 轴的相关参数。"},"3":{"desc":"众所周知，一次堵头或缠料就可以毁掉整个精美的打印件。以往的断料监测往往只能覆盖很少一部分的故障场景。A1 mini 和 AMS lite 上加入了一套完整的耗材监测系统，包括工具头上的缠料监测传感器，断料监测传感器，喷嘴压力传感器，以及 AMS lite 上的耗材里程计。这些传感器配合先进的算法，能够及时感知诸多潜在的问题，包括耗材打结、断料、挤出机空转等。"},"4":{"desc":"AMS lite 适配市面上的大多数耗材。当使用拓竹官方耗材时，AMS lite 会利用 RFID 识别技术检测使用的耗材，并自动为其应用恰当配置。同时，它让你能够远程监控耗材的使用。"},"5":{"desc":"A1 mini 利用喷嘴作为探针，测量喷嘴与热床间的绝对距离。实现全自动热床调平，无需手动调整。"},"6":{"desc":"与 XYZ 轴的线性运动和牛顿运动不同，熔融塑料的粘性流动是非牛顿流体的。在高加速度下，挤出机推入热端的耗材量不一定等于从喷嘴流出的耗材量，这种差异可能导致膨胀的拐角和速度变化带来的伪影。这就是主动流量补偿发挥作用的地方。它有助于预测和调整熔融塑料的流量，促进更准确的挤出。以前，我们用加速度打印直线，并测量线的宽度来校准补偿参数——这一过程很耗时，而且浪费了构建板上的空间。在A1 mini中，我们采用了一种新的方法来测量喷嘴压力，使我们能够在每次打印前直接获得必要的参数，从而节省时间并保留构建板空间。"},"7":{"desc":"步进电机在高速运动时往往会产生更大的噪音。我们通过电机驱动将特定的高频微动注入电机来主动降噪，这样只要了解每个电机的详细声纹特征，就可以消除大部分噪音。针对每台电机的独特“声纹”，A1 mini 会利用传感器和算法校准每个驱动电机之间的微小差异，更高效地消减电机噪音。"},"8":{"desc":"使用 Bambu Handy（移动端 APP）或 Bambu Studio 操控或监看你的 A1 mini。即使不在现场，也能远程掌控全场。"}},"mysteryBox":{"1":{"name":"V型双缸引擎"},"2":{"name":"LED 灯"},"3":{"name":"弹珠跑道"},"4":{"name":"无线鼠标"},"sectionTitle":"妙趣功能","title":"盲盒","desc":"我们将随机在包装箱中放置盲盒，内置 4 款趣味模型的制作组件，让你快速上手完成一个超棒的打印作品！\n盲盒数量有限，祝你好运~"},"printerMelody":{"title":"打印机之歌","desc":"A1 mini 可以在没有扬声器的情况下演奏电子音乐。通过驱动 3 个驱动电机，产生特定振动频率，它可以同时播放多达 3 条音轨。使用 MIDI To GCode 生成器，尝试使用你自己的 MIDI 文件生成可播放音轨的 Gcode，让 A1 mini 给你唱首小曲。","learnMore":"了解更多"},"techSpec":{"title":"技术参数","name":"A1 mini"}},"x1e":{"printer":{"title":"Bambu Lab X1E","richTitle":"\u003c0\u003eBambu Lab \u003c/0\u003e\u003c1\u003eX1E\u003c/1\u003e","desc":"赋能灵机，智造未来","contactButtonText":"联系我们","resellerButtonText":"购买渠道","includedAMS":"*标配 AMS","priceText":"MSRP: {{price}}(税前)"},"section1":{"sectionTitle":"支持以太网有线连接，无线网络升级 WPA2-Enterprise 安全协议","title":"更多样更强悍的网络连接","desc":"X1E 新增了以太网口，支持使用实体网线连接您的打印机与控制设备。在复杂信号环境中，使用有线网络连接更为稳定安全。针对无线网络连接，X1E 新加入了对 WPA2-Enterprise 协议的支持，包括 EAP-PEAP / EAP-TLS / EAP-TTLS。X1E 还装备了实体网络开关，能独立物理断连无线网关和以太网关，以应对更加严苛的网络安全需求。"},"section2":{"sectionTitle":"在局域网模式下也功能全面","title":"脱云服务运作","desc":"X1E 在不连接云服务的状态下也能正常运作，可通过您的本地网络实现绝大部分功能。用户可通过局域网来控制并传输数据给 X1E，而无需连接互联网云服务。如有进阶需求，联系您的销售经理，获取更多开发者功能信息。"},"section3":{"sectionTitle":"有效过滤 3D 打印中产生的颗粒物及气味","title":"高性能空气过滤系统","desc":"X1E 的高性能滤芯由 G3 初效过滤器、H12 HEPA 滤芯和高性能椰壳活性炭滤芯复合而成。复合滤芯能够有效过滤打印过程中产生的颗粒物及气味，显著提升在密闭空间中 3D 打印机的使用体验。"},"section4":{"sectionTitle":"减少翘曲，增强层间结合力","title":"主动腔温加热及控制","desc":"X1E 具备主动加热功能和精准的腔温控制能力，其腔温能从室温快速升至 60℃，并在室温至 60℃ 范围内精准控温，有效提升 ABS 和 PC 等易翘曲材质的打印质量。"},"section5":{"sectionTitle":"解锁更多高温材料","title":"320°C 高温喷嘴","desc":"更高的喷嘴温度让 X1E 能解锁更高性能的耗材，如 PPA-CF/GF、PPS 和 PPS-CF。这些高性能耗材具备更稳定的机械强度与耐温性，为您的项目提供更多可能性。"},"section6":{"sectionTitle":"可靠框架稳定支持连续高速打印","title":"耐用的高速CoreXY架构","desc":"特别定制的超轻高强度碳纤维 X 轴滑动连杆与 CoreXY 架构帮助 X1E 更轻松地达到 20,000 mm/s² 的最大加速度。更轻的可动部件与超高的加速度让 X1E 能在打印过程中达到更高的平均移动速度，显著减少打印时间。"},"section7":{"sectionTitle":"稳定且高质量的高速打印表现","title":"振动补偿与挤出补偿","desc":"X1E 支持主动振动补偿与流量补偿，让高速打印下的模型表面更光滑，转角更为锐利。以上相关参数的测量与运用皆由机器自动进行，无需任何手动调整。"},"section8":{"sectionTitle":"减少耗材浪费并降低故障风险","title":"AI算法监测打印失败","desc":"X1E 具备 AI 算法监测功能，运用激光雷达及摄像头的信息监控首层瑕疵和炒面，在检测到可能错误后自动暂停打印，帮助规避不必要的浪费和次生灾害。"},"section9":{"sectionTitle":"支持自动续料及多耗材打印，可用专用支撑材料提升模型品质","title":"智能耗材管理系统","desc":"搭配 AMS 智能自动供料系统，X1E 具备自动续料功能，让您可以真正地用尽每一卷耗材，避免不必要的浪费。针对每台 X1E，最多支持 4 台 AMS 并联，最高可同时使用 16 种不同的耗材，支持打印多色或使用专用支撑材料。"},"inTheBox":{"1":"X1E","2":"AMS","3":"打印板","4":"PAHT-CF，PLA-CF\nSupport fo 随着时间的推移，打印机仍能保持一致的精度和卓越性能。"},"2":{"title":"一次打印，丝滑装配","desc":"拓竹的自动轴孔补偿⁽²⁾可最小化打印公差，为孔洞尺寸带来机加工级别的精度。你可以放心设计对装配要求严格的零件 —— 无需繁琐调整装配间隙，即可次次实现与钢轴、轴承、紧固件等标准件的完美装配。"},"3":{"title":"为工程耗材而生","desc":"配备最高 350°C 的热端和最高 65°C 的主动腔温加热，H2S 支持打印整个拓竹耗材产品线中的产品 —— 从 PLA 和 PETG，到 PC 和 PPA 。通过闭环风扇控制和精确的热管理，H2S 在提高模型层间强度的同时，可将翘曲和变形降至最低。用 H2S 来制作既强大又实用的大型高性能部件吧。","tabs":{"1":"350°C 热端","2":"65°C 主动腔温加热"}},"4":{"title":"表面平整，边缘锐利","desc":"利用挤出机上伺服电机的传感能力和喷嘴上的高分辨率涡流传感器，在打印开始前，H2S 可通过测量喷嘴压力和校准每条耗材的 PA 参数来精确控制挤出，从而提高表面平滑度和棱角锐利度。"},"5":{"title":"高速也精准","desc":"主动振动补偿可实时抵消微振动和共振，带来更高速下也稳定平滑的打印质量。"},"6":{"title":"打印功能性设计","labels":{"1":"卡丁车车架：PAHT-CF","2":"手袋：AMS 专用 TPU","3":"育苗器：PA6-GF","4":"RC 飞机：PLA 超韧"}}}},"2":{"title":"坚实可靠的智能","sections":{"1":{"title":"每秒 20,000 次检查","subTitle":"闭环反馈，实时控制","desc":"拓竹自研的 PMSM 伺服电机实现挤出系统的智能管控，它执行 20kHz 的电流与位置信号采样，用以动态调节挤出扭矩。稳定挤出的同时，检测耗材磨料⁽³⁾和堵塞。","labels":{"1":"磨料","2":"堵头"}},"2":{"title":"23个传感器 + 3个摄像头","subTitle":"每个潜在风险都有针对性传感器","tabs":{"1":{"title":"视觉系统","desc":"借助 AI 驱动的实时监测系统，视觉系统能及时检测到堵头、炒面、废料滑梯堆料等问题，有助于事先预防打印失败。同样的视觉系统还为视觉空间对齐等高级功能提供支持，实现精确的激光和切割校准；辅助视觉编码系统技术，提高位置精度。"},"2":{"title":"送料","desc":"耗材路径传感器们协同工作，以监测送料速度和位置，检测缠料和磨料风险，跟踪耗材里程和料卷使用情况，并确保 AMS、缓冲器、切刀和送料路径上的工具随时就位可用，每一步操作都在掌控之中。"},"3":{"title":"热控制","desc":"五个 NTC 温度传感器被按照需求规划布置在喷嘴、热床和腔室内各处。与整套系统内与气流相关的传感器密切配合，通过实时反馈系统主动监测和调节内部温度及循环，从而维持理想的打印环境。"},"4":{"title":"安全","desc":"H2S 配备了五个火焰传感器、前门和顶盖传感器以及急停按钮，构成一个完整的安全系统。它能检测火灾风险、监测机箱封闭状况，并在必要时即时关机，时刻保护你的项目和工作空间。"}}},"3":{"title":"AI 全自动启始检查","desc":"在每次任务开始前，H2S 的 视觉系统都会启动全面的打印前检查。1. 舱内杂物扫描，确保舱内无异物。2. 硬件配置扫描，识别打印板类型。"},"4":{"title":"自动风门与过滤系统","subTitle":"3D打印与激光切割，3种模式一体化","cards":{"1":{"title":"高温打印","desc":"腔室密封。内部空气通过空气过滤器和加热器循环，以获得稳定的高温环境，打印大型工程部件模型时不变形。"},"2":{"title":"低温打印","desc":"顶部通风口打开，引入冷空气，同时保持过滤后的排气⁽⁴⁾。无需开门即可打印 PLA 和 PETG 耗材，轻松处理悬垂和桥接问题。"},"3":{"title":"激光切割/雕刻","desc":"顶部通风口和自动风门打开。烟雾被有效地引导至通风系统，确保你的工作空间安全清洁。"}}}}},"3":{"title":"更大、更快、更强","sections":{"1":{"title":"最大尺寸，最大生产力","desc":"340×320×340 mm³ 的成型面积，H2S 是拓竹迄今为止最大的 3D 打印机。在一次打印中，充分实现你的设计想法。","imgs":{"1":{"title":"大 120% 的打印尺寸","subTitle":"相比 X1-Carbon"},"2":{"title":"全尺寸打印","subTitle":"用更少的盘数，打印更大的模型"}}},"2":{"title":"最高打印速度，空前值得信赖","desc":"拓竹专研的 PMSM⁽⁵⁾ 伺服挤出系统可提供 67% 额外挤出力，为高流量⁽⁶⁾打印提供坚实基础。搭配最高 1000 mm/s 的工具头移动速度和最高 20,000 mm/s² 的加速度，H2S 可压榨极致打印速度 —— 将打印时间缩短至多 30%⁽⁷⁾ —— 同时保持顶级打印质量。","imgs":{"1":{"title":"灵玑挤出机","subTitle":"PMSM 伺服挤出机可提供高达 10kg 的挤出力，比普通步进电机高出 67%，为高流量打印提供最坚实的基础。"},"2":{"time":"1 天 7 小时","title":"比 X1C 快 12.3%"},"3":{"time":"1 天 1 小时","title":"比 X1C 快 11.2%"},"4":{"time":"6 天","title":"比 X1C 快 22.2%"}}}}},"4":{"title":"激光/刀切/绘图","sections":{"1":{"title":"紧凑、强大，多合一","cards":{"1":{"title":"实时视觉空间对齐","subTitle":"俯视摄像头⁽⁸⁾和工具头摄像头支持实时视觉空间对齐功能，让你能够以 0.3 mm 的精度直接在材料图像上预览刀具路径，所见即所得。"},"2":{"title":"自动排列","subTitle":"Bambu Suite 会自动排列项目形状，充分利用每份耗材，既智能、高效又轻松。"},"3":{"title":"10W 455nm 激光功率","subTitle":"轻松切割厚度达 5mm 的胶合板、亚克力或 PU 材料 —— 干净、快速且精准。"},"4":{"title":"气流辅助","subTitle":"气流辅助功能通过吹走烟雾和炭渣，同时冷却表面来保持激光雕刻和切割的线条清晰 —— 防止积炭和光束畸变，从而获得锐利、干净的效果。"},"5":{"title":"数字刀切","subTitle":"轻松切割纸张、乙烯基、PU 人造革等材料 —— 切口干净、精准，成品精细可用。"},"6":{"title":"绘图","subTitle":"使用绘图模块自动处理线条、草图或手写笔记 —— 精确、可重复，解放双手。"}}},"2":{"title":"不是工具包，而是一个稳定可靠的综合生产平台。"}}},"5":{"title":"内外皆受保护","sections":{"1":{"title":"安全性，与生俱来","labels":{"1":{"title":"激光防护视窗","desc":"在保持内部工作空间清晰可见的同时，保护你的眼睛免受 455 nm 激光束的伤害。"},"2":{"title":"五个火焰传感器","desc":"火焰传感器持续监测火灾风险。如果检测到问题，响亮的蜂鸣器和 APP 移动警报⁽⁹⁾会立即通知你，以便你迅速采取行动，保障安全。"},"3":{"title":"整机内部防火","desc":"H2S 腔体内部采用阻燃材料，提供全面的被动防火安全保护。"},"4":{"title":"急停按键","desc":"如果感觉有异常，立即停止操作 —— 让你完全掌控局面，更加安心。"}}},"2":{"title":"怎样都能连接，隐私保护设计","desc":"支持云端连接的同时，H2S 也支持本地局域网模式和物理连接操作。你可以在不连接因特网的情况下控制打印机、发送切片、更新固件。对于喜欢捣鼓的用户，开发者模式也让你可用第三方配件和软件通过 MQTT 连接和操控打印机。⁽¹⁰⁾"}}},"6":{"title":"便捷、舒适、经久耐用","sections":{"1":{"title":"快拆喷嘴","desc":"几秒就能更换喷嘴 —— 无需任何工具，轻松便捷。无论是更换大流量热端、还是不同尺寸的热端，快拆热端设计都能让操作变得简单直观，即使是初次使用的用户也能轻松上手。"},"2":{"title":"静音设计","desc":"采用主动电机降噪和专研风道降噪技术，H2S 运行时噪音低于 50dB⁽¹¹⁾。可在夜间或共享空间中进行打印，而不会干扰周围环境。"},"3":{"title":"全金属机身 \u0026 压铸框架","desc":"一体化压铸铝合金框架，结构坚固稳定，为高速、大尺寸打印提供刚性基础，最大限度减少了结构微变形造成的精度损失。"}}},"7":{"title":"多色打印与烘干一体机","amsCard":{"1":{"title":"AMS 2 Pro","buttonText":"了解更多"},"2":{"title":"AMS HT","buttonText":"了解更多"}},"sections":{"1":{"title":"电磁风门","desc":"自动排气有利于干燥过程中的除湿和气密密封，为你带来几周时间的高质量打印。"},"2":{"title":"自旋转均匀烘干","desc":"烘干过程中，料盘会自动进行转动，让烘干效果更均匀。"},"3":{"title":"RFID 自动参数匹配","desc":"使用拓竹官方耗材时，AMS 2 Pro 可借助 RFID 自动匹配烘干设置，无需手动设定。"}}},"8":{"title":"无限模型，畅享打印","sections":{"1":{"sectionTitle":"MakerWorld","title":"超过百万免费模型，触手可及","desc":"在 MakerWorld，随时为 H2S 找到海量优质模型。快捷省心打印，无需繁琐参数设置或漫长切片过程。模型自带专属特定打印机或耗材的定制化配置文件，只需点击“打印”，打印机即可开始打印。MakerWorld 给每台拓竹打印机带来了无比轻松的打印体验，让你随时可以体验新鲜模型，打印机绝不闲置。"},"2":{"sectionTitle":"MakerLab","title":"AI 辅助 3D 建模工具，变想象为现实","desc":"将您最喜爱的艺术品变成个性化灯箱，将心爱的照片变成浮雕，或通过简单的提示创作独一无二的 PrintMon 小雕像。使用 Bambu Lab MakerLab，您无需任何 3D 建模技能即可进行设计和定制。您可以用您喜爱的动漫人物制作书签，或为您的办公桌量身定制一个收纳盒，方便放置便签。无论您的构想是什么，都能轻松实现。"},"3":{"sectionTitle":"创客宝库","title":"让 3D 打印栩栩如生的零件首选供应商","desc":"Maker's Supply 提供您项目所需的所有非 3D 打印硬件，从电机、LED 到螺栓和磁铁，应有尽有。所有套件均经过预先测试，与您选择的 MakerWorld 项目的物料清单 (BOM) 完全匹配。只需打印、组装，即可享受！"}}},"9":{"title":"集成生态系统，端到端支持","sections":{"1":{"sectionTitle":"软件生态系统","title":"随时随地通过任何设备进行控制和浏览","desc":"电脑端的 Bambu Studio、Bambu Suite 和手机端的 Bambu Handy，覆盖了所有打印机功能、构建了完整的多端软件生态系统，让你可以随时随地在任何设备上管理和控制打印机，和浏览 MakerWorld 内容。同时，拓竹账户可以链接你的所有活动，让你无需担心切换设备或位置时丢失进度。"},"2":{"sectionTitle":"拓竹学院","title":"通过简单易懂的课程掌握打印机","desc":"无论您是刚刚开启 3D 打印之旅，还是渴望成为专家，Bambu 学院都能根据您的具体打印机型号提供量身定制的课程。我们精心设计的课程适合所有技能水平，帮助您快速掌握知识和技能，充分利用您的打印机。"},"3":{"sectionTitle":"拓竹官方 Wiki","title":"找到每个打印问题的答案","desc":"无论遇到什么问题，都能在这找到答案。从处理堵头和裹头，到维护磨损了的打印机部件，拓竹 Wiki 都能提供分步骤指南，说明清晰、图示准确。不管你是有排障需求，还是想要更好地了解你的打印机，都可以在这里找到详细的指导。"}}},"video":{"title":"看看你能用 3D 打印做什么"}},"note":{"1":"1. 如需使用运动精度增强功能，需于拓竹官方商城另外选购视觉精度编码板。","2":"2. 自动轴孔补偿需要在 Bambu Studio 中启用功能，并使用对应的官方耗材方可生效。","3":"3. 磨料检测对不同的耗材支持可能有所差异，以实际功能为准。","4":"4. 用于低温打印的过滤模式为可选功能，预计最快将于 2026 年第一季度上线。","5":"5. 永磁无刷伺服电机。","6":"6. 高流量热端为选装配件，可于拓竹官方商城购买。","7":"7.  使用拓竹基础色打印 200 × 200 × 200 mm 填充率为 15% 的立方体，与拓竹 X1-Carbon 相比，H2S 的打印时间可缩短高达 30%。实际节省时间可能因型号、填充材料和所用耗材而异。","8":"8. 激光和数字刀切功能均通过 Bambu Suite 软件进行控制和可视化。实时空间对齐功能由俯视摄像头摄像头实现。俯视摄像头摄像头为 H2S 激光版标配，打印版也可通过激光升级套件获得。","9":"9. 推送通知需要使用 Bambu Handy 并保持云端连接。","10":"10. 出于功能安全性考虑，开发者模式不能用于激光与数控切割功能。","11":"11. 环境噪音：40 dB，测试距离：1 m。","12":"12. 图片中所示的卡丁车车架仅是完整车辆的部件，其可用性、耐用性受到车辆整体设计和制作的限制。在获得所在区域有关机关许可前，将无法作为车辆上路使用。开展任何有关操作时，请严格遵守本地所适用的法律法规。","13":"13. 创作者项目仅供示例参考。拓竹不为创作者项目提供任何背书，也不就创作者项目作出任何陈述或保证，包括但不限于基于此类项目的任何 3D 打印作品的安全性、市场性或可用性。更多信息请参阅我们的服务条款。","14":"14. 激光雕刻和切割过程中，请确保有人值守并监控作业进程。如有特殊身体情况，如对强光、烟雾过敏等，请谨遵医嘱。有关激光使用的安全说明，请参阅《激光模组使用安全指引》Wiki (https://wiki.bambulab.com/zh/h2/manual/imp-info-laser) 和《激光安全文档》 (https://wiki.bambulab.com/zh/h2/laser-safety-document)。","15":"15. H2S 的所有产品数据，如 PMSM 挤出力提升、模型打印时间等，均来自于拓竹的内部测试。实际结果可能因产品个体差异、用户使用习惯和环境条件而异。请以实际使用情况为准。","16":"16. 感谢创作这些惊艳模型项目的创作者们：赤影，暗黑骑士之剑, 影铸铠甲 @sarwtin；太平洋飞剪号 @Rarecho Studio；CyberTrack @CyberBrick™；皮卡，跑车 @火鸟 @jinghai；MODCASE HYPER @HaydnBao；Fishcaster-Lite电吉他 @翻滚吧咸鱼；收纳工具箱 @schuylab；Gridfinity收纳盒 @Finneas；卡丁车 @大琢磨；“节节高”小型 @riccky.svg；自浇水育苗器 @GLB_Meyui；小型FPV载机 @老晏 FPV；经典敞篷跑车 @GLB_21CNCStudio；笔筒 @yanribing；可折叠木盒 @GLB_woodbear；圆盒@GLB_brandon8747；糖果三轮车 @garagem 167；花卉收纳盒 @GLB_MetaImi；橄榄球头盔@GLB_animuL67；边桌 @GLB_AEKI；Mini Catmaw - CyberBrick 版本 @GLB_polymech3d；布达佩斯大饭店 @雅杰不加班。","title":"*注释：","richText":"1. 如需使用运动精度增强功能，需于拓竹官方商城另外选购视觉精度编码板。\n2. 自动轴孔补偿需要在 Bambu Studio 中启用功能，并使用对应的官方耗材方可生效。\n3. 磨料检测对不同的耗材支持可能有所差异，以实际功能为准。\n4. 用于低温打印的过滤模式为可选功能，预计最快将于 2026 年第一季度上线。\n5. 永磁无刷伺服电机。\n6. 高流量热端为选装配件，可于拓竹官方商城购买。\n7.  使用拓竹基础色打印 200 × 200 × 200 mm 填充率为 15% 的立方体，与拓竹 X1-Carbon 相比，H2S 的打印时间可缩短高达 30%。实际节省时间可能因型号、填充材料和所用耗材而异。\n8. 激光和数字刀切功能均通过 Bambu Suite 软件进行控制和可视化。实时空间对齐功能由俯视摄像头摄像头实现。俯视摄像头摄像头为 H2S 激光版标配，打印版也可通过激光升级套件获得。\n9. 推送通知需要使用 Bambu Handy 并保持云端连接。\n10. 出于功能安全性考虑，开发者模式不能用于激光与数控切割功能。\n11. 环境噪音：40 dB，测试距离：1 m。\n12. 图片中所示的卡丁车车架仅是完整车辆的部件，其可用性、耐用性受到车辆整体设计和制作的限制。在获得所在区域有关机关许可前，将无法作为车辆上路使用。开展任何有关操作时，请严格遵守本地所适用的法律法规，避免带来风险或损害。\n13. 创作者项目仅供示例参考。拓竹不为创作者项目提供任何背书，也不就创作者项目作出任何陈述或保证，包括但不限于基于此类项目的任何 3D 打印作品的安全性、市场性或可用性。更多信息请参阅我们的服务条款。\n14. 激光雕刻和切割过程中，请确保有人值守并监控作业进程。如有特殊身体情况，如对强光、烟雾过敏等，请谨遵医嘱。有关激光使用的安全说明，请参阅《激光模组使用安全指引》Wiki (https://wiki.bambulab.com/zh/h2/manual/imp-info-laser) 和《激光安全文档》 (https://wiki.bambulab.com/zh/h2/laser-safety-document)。\n15. H2S 的所有产品数据，如 PMSM 挤出力提升、模型打印时间等，均来自于拓竹的内部测试。实际结果可能因产品个体差异、用户使用习惯和环境条件而异。请以实际使用情况为准。\n16. 感谢创作这些惊艳模型项目的创作者们：赤影，暗黑骑士之剑, 影铸铠甲 @sarwtin；太平洋飞剪号 @Rarecho Studio；CyberTrack @CyberBrick™；皮卡，跑车 @火鸟 @jinghai；MODCASE HYPER @HaydnBao；Fishcaster-Lite电吉他 @翻滚吧咸鱼；收纳工具箱 @schuylab；Gridfinity收纳盒 @Finneas；卡丁车 @大琢磨；“节节高”小型 @riccky.svg；自浇水育苗器 @GLB_Meyui；小型FPV载机 @老晏 FPV；经典敞篷跑车 @GLB_21CNCStudio；笔筒 @yanribing；可折叠木盒 @GLB_woodbear；圆盒@GLB_brandon8747；糖果三轮车 @garagem 167；花卉收纳盒 @GLB_MetaImi；橄榄球头盔@GLB_animuL67；边桌 @GLB_AEKI；Mini Catmaw - CyberBrick 版本 @GLB_polymech3d；布达佩斯大饭店 @雅杰不加班。"}},"h2d":{"header":{"overview":"产品概览","diveIn":"深入了解","specs":"技术参数","faq":"常见问题","buy":"立即购买","personalManufacturing":"个人智造中心","accuracy":"精度革命","dualNozzle":"双头打印","intelligence":"感知驱动智能","bigger":"更大，更强","safety":"安全无小事","ams":"全新 AMS"},"printer":{"name":"拓竹 H2D"},"banner":{"title":"重新定义个人智造","buyNow":"立即购买","watchVideo":"观看视频"},"highlight":{"1":{"title":"精度革命","desc":"运动精度提升一个量级。"},"2":{"title":"多功能个人智造中心","desc":"一体化集成 3D 打印、激光、数控刀切和绘图功能。"},"3":{"title":"双头 3D 打印，双倍效能","desc":"多材料混打，超快超高效！","author":"3D打印鞋 @马黛"},"4":{"title":"智能，让使用更简单","desc":"机身配备 4 个视觉摄像头、36 个传感器和 2 个伺服电机*，在先进算法统筹下，让 H2D 使用起来更为简便流畅。"},"5":{"title":"新一代耗材管理系统","desc":"一站式搞定烘干、密封存储、自动供料。","note":"*AMS HT 需额外购买。"}},"gallery":{"1":{"title":"鞋","author":"3D打印鞋 WhaleBerry @云莓"},"2":{"title":"仿生蝴蝶灯","author":"仿生蝴蝶灯 @Darts_3D"},"3":{"title":"自行车坐垫","author":"自行车坐垫 @八宝 "},"4":{"title":"骑行头盔","author":"骑行头盔 @云莓"},"5":{"title":"刺客盔甲","author":"刺客盔甲 @寺工"},"6":{"title":"生日贺卡","author":"生日贺卡 @Viktor Losev "},"title":"发现个人智造的无限可能性","processType":{"3DPrinting":"3D 打印","multiMaterial":"多材料3D打印","dualColor":"多色3D打印","digitalCutting":"数控刀切","laserEngraving":"激光雕刻","laserCutting":"激光切割"}},"accuracy":{"section":{"1":{"title":"精度革命，由此开始","desc":"H2D 的运动系统精度提升了一个量级，大大减少了为配合标准件或完成装配所做的频繁模型和配置调整。"},"2":{"sectionTitle":"杀手锏：视觉编码系统","title":"50µm 极致运动精度","desc":"超高精度视觉编码板，结合 5µm 分辨率光学测量对工具头运动情况进行校准，使 H2D 能够在整个工作空间内实现一致、可靠的、与运动距离无关的 50µm 运动精度，精度比前代产品提升一个数量级。\n（*视觉编码板需单独购买。）"},"3":{"sectionTitle":"自动轴孔补偿","title":"无需任何调整，装配严丝合缝、一气呵成","desc":"得益于 H2D 增强的运动精度和 Bambu Studio 针对特定拓竹官方耗材的专门校准，无需繁琐地调整装配间隙，即可次次实现与钢轴等标准件的完美装配。"},"4":{"sectionTitle":"双喷嘴偏移 \u003c 25µm","title":"双喷嘴打印，和单喷嘴打印一样平滑","desc":"新一代双喷嘴偏移校准技术能够快速可靠地校准并对齐两个喷嘴，最小化偏移量。与其他喷嘴对齐技术不同，H2D 的非接触式测量非常稳定，且不受喷嘴脏污的影响。","media":{"1":"H2D","2":"竞品"},"text":{"1":"H2D 双喷嘴","2":"其它双喷嘴"}}},"more":{"card1":{"sectionTitle":"喷嘴压力传感 \u0026 主动流量补偿","title":"棱角更锐，表面更平","desc":"利用挤出机上伺服电机的传感能力和喷嘴上的高分辨率涡流传感器，H2D 可通过测量喷嘴压力和校准每条耗材的 PA 参数来精确控制挤出，从而提高表面平滑度和棱角锐利度。"},"card2":{"sectionTitle":"主动振动补偿","title":"打印得再快也超丝滑","desc":"为了最大限度地减少高速打印过程中的带状振纹，H2D 采用了自动振动补偿。凭借工具头内的传感器，系统在每次打印之前都重新校准参数，以带来稳定平滑的高速打印质量。"},"card3":{"sectionTitle":"悬浮阻尼脚垫","title":"隔绝外部振动","desc":"H2D 采用了悬浮阻尼脚垫，其共振频率经过了精确调整，可有效隔离机器与桌面的振动。即使存在外部振动源，也能确保打印质量卓越稳定。"}}},"personalManufacturing":{"section":{"1":{"title":"一台机器，全部搞定","desc":"除了 3D 打印，H2D 还带来了\u003cgreen\u003e激光加工\u003c/green\u003e与\u003cgreen\u003e数控切割\u003c/green\u003e、\u003cgreen\u003e绘图\u003c/green\u003e等多种工艺，让创造不被设限。"},"2":{"sectionTitle":"视觉空间对齐","title":"所见即所得","desc":"视觉空间算法配合 H2D 全新俯视摄像头，可提供高达 0.3 mm 的俯视图对齐精度。由此，用户可以随心对照材料实物情况，规划并放置工作路径，真正实现“所见即所得”。"},"3":{"sectionTitle":"先打印，后切割","title":"多彩创作从未如此简单","desc":"从平面打印到精确切割，只需片刻。使用 Bambu Suite 设计并打印想要的图案，一键发送给 2D 打印机。H2D 会自动将刀切路径与打印图案对齐，轻松完成精准切割。"},"4":{"sectionTitle":"实拍自动摆盘","title":"最大化材料利用率，边角料也是宝","desc":"凭借俯视摄像头相机所拍的实时图像，Bambu Suite 可以根据材料情况（如：在用过的胶合板上），自动帮忙摆盘，优化材料利用率，以确保在每个项目中都最大程度利用耗材、减少浪费。","key":"自动摆盘"}},"swiper":{"1":{"title":"激光","desc":"10W 和 40W 激光，自由雕刻 \u0026 切割"},"2":{"title":"数控刀切","desc":"在多种材料上精准切割"},"3":{"title":"画笔","desc":"绘图与书写"},"createdBy":"Model created by {{author}}"},"cardSection":{"1":{"title":"告别手动激光对焦和手动耗材厚度测量","cards":{"1":{"title":"扫码识别耗材预设","desc":"轻松同步预设，无需手动输入。H2D 可以自动扫描耗材上的二维码，以加载官方预设。"},"2":{"title":"一键自动校准","desc":"轻轻一点，即可启动自动激光焦距验证和材料厚度识别，无需手动调整任何模块，即可如实配置材料厚度、完成定位。"}}},"2":{"title":"硬核激光性能","cards":{"1":{"title":"高功率 455nm 激光","desc":"可选 10W 与 40W 激光，分别能切割 5mm 与 15mm 的椴木胶合板。"},"2":{"title":"气流辅助","desc":"通过主动高速气流为激光路径区域降温，提升工件表面质量。"},"3":{"title":"无接触 3D 测高","desc":"独立光学测高，无需物理接触即可快速准确测量三维网格，使精准曲面激光加工成为可能。"},"4":{"title":"旋转轴附件","desc":"可拓展旋转轴附件，在圆柱体、球体、环状物品上解锁激光雕刻。"},"5":{"title":"激光防护视窗","desc":"无需佩戴护目镜，即可安全操作并监看激光作业。"},"6":{"title":"烟尘过滤器","desc":"可选激光专用烟尘过滤器，确保使用激光期间，室内空气质量始终如一。"}}}}},"dualNozzle":{"section":{"1":{"title":"双喷嘴系统，双倍灵动","desc":"体验机械结构的艺术性，和 H2D 突破性的双喷嘴切换系统带来的多材料打印的全部潜力。轻巧、精确、可靠，可实现无忧的材料更换，解锁无限创意可能性。","nozzle":{"left":"左喷嘴","right":"右喷嘴"}},"2":{"sectionTitle":"全自动双喷嘴偏移校准","title":"无需上手，更不需要任何工具","desc":"体验涡流传感技术带来的超高精准度吧。无需接触即可快速、自动进行双喷嘴偏移校准，不受喷嘴脏污影响。整个过程无需任何手动操作、无需使用工具、无需任何指南，简化了用户工作流程。"}},"cardSection":{"1":{"cards":{"1":{"sectionTitle":"多材料打印","title":"混搭柔性和刚性耗材、低成本和特殊耗材","desc":"在单次打印中，结合柔性和刚性耗材，创造出令人叫绝的互锁结构和超越传统的创新设计。合理搭配高性能耗材与普通耗材，仅在必要时使用高性能耗材，降低打印成本、提高耗材效率。","author":"MOCA Pro @thrutheframe "},"2":{"sectionTitle":"专用支撑耗材","title":"使用支撑耗材不再心疼","desc":"打印支撑不再是难题。借助 H2D 的双喷嘴配置，其中一个喷嘴可被支撑耗材打印，从而提升打印稳定性和支撑接触面质量。","author":"AirPods Max Case @设计发射塔"},"3":{"sectionTitle":"高效多色打印","title":"更快更省料的多色打印","desc":"双喷嘴打印可减少多色打印中的冲刷。H2D 的智能算法可计算最佳的耗材使用率，最大程度地提高双喷嘴效率，节省时间和材料。"}}}}},"intelligence":{"section":{"1":{"title":"感知驱动智能","desc":"H2D 重新定义“\u003cgreen\u003e感知智能\u003c/green\u003e”。它集成了四摄像头计算机视觉系统和 36 个传感器阵列，经过拓竹独家神经算法协同，H2D 能够实现\u003cgreen\u003e微米级测量精度\u003c/green\u003e、自我优化的校准流程和智能\u003cgreen\u003e实时\u003c/green\u003e问题诊断。"},"2":{"sectionTitle":"AI 全自动启始检查","title":"每次打印都放心","desc":"在每次任务开始前，H2D 的 视觉系统都会启动全面的打印前检查。1. 舱内杂物扫描，确保舱内无异物。2. 硬件配置扫描，识别喷嘴类型和打印板类型。3. 交叉检查，识别硬件规格，并与当前切片参数对比，确保一致性，避免打印错误。"},"3":{"sectionTitle":"灵玑挤出机系统","title":"智能感知，精确控制挤出 \u0026 检测进料问题","desc":"拓竹自研的 PMSM 伺服电机实现挤出系统的智能管控，它执行 20kHz 的电流与位置信号采样，用以动态调节挤出扭矩。稳定挤出的同时，检测耗材磨料和堵塞。"},"4":{"sectionTitle":"最强进料监测","title":"智能感知，实现精确挤出控制","desc":"拓竹自研的 PMSM 伺服电机实现挤出系统的智能管控，它执行 20KHz 的扭矩/阻力与相位采样，用以动态调节挤出扭矩，降低 VFA 并能同时检测耗材磨料和堵塞。"},"5":{"sectionTitle":"最强进料监测","title":"进料路上，15 个传感器层层把关","desc":"稳定的进料是确保打印件质量的关键。在整个 AMS 到喷嘴的系统中，15 个精心安置的传感器构成了一个智能网络，持续跟踪五个关键信息：进料速度、耗材张力变化、耗材料线位置、挤出机热工况和动态挤出压力，并及时对问题作出反馈，规避创作路上的堵头、缠料、断料等问题。"},"6":{"sectionTitle":"HMS 2.0 健康管理系统","title":"全面支持，始终如一","desc":"HMS 系统可调用机身上下全部传感器和摄像头，通过类似于汽车诊断代码的高级逻辑来精确定位打印问题。提供清晰、详细的故障排除指导，确保你能快速解决问题、重新投入创意工作。"}},"expandVideoSection":{"sectionTitle":"喷嘴摄像头","title":"监控喷嘴端的挤出情况","desc":"H2D 配备了带微距镜头的 AI 喷嘴摄像头。智能监控系统持续跟踪挤出状态，即时检测耗材堆积、耗材挤出偏差和挤出故障。","videoLabel1":"裹头","videoLabel2":"空打","videoLabel3":"炒面"}},"bigger":{"section":{"1":{"title":"更大，更强，更快","desc":"H2D 有着更大的成型尺寸、更快的速度和更强的高性能耗材运用能力。不仅开辟了创意空间，也拓宽了耗材选择，让你的作品更上一层楼。"},"2":{"sectionTitle":"超大工作区","title":"摆脱尺寸限制","desc":"最大 350mm×320mm×325mm* 成型体积，创作大尺寸作品从未如此简单！从在大型物体上激光雕刻，到打印超大模型，一切都变得更加宽广，尽管发挥创作的激情。","media":{"1":"最大","2":"单喷嘴","3":"双喷嘴"}},"3":{"sectionTitle":"350℃ 高温热端，65℃ 主动腔温加热","title":"为榨干高性能耗材的性能而生","desc":"H2D 配备 65°C 主动腔温加热和最高 350℃ 的高温热端，带来精确的闭环温度控制。这套先进机制可抑制高性能材料的翘曲和变形，确保提升层间粘接，最大限度地发挥高性能耗材的优势。","media":{"1":"高温喷嘴","2":"主动腔温"}},"4":{"sectionTitle":"真·高流量热端","title":"600mm/s 真高速持续打印","desc":"H2D 专门设计的高流量热端能够以 600 mm/s 的速度可靠高速打印。为始终如一的打印表现而设计，消除打印中的降速问题，无论打印尺寸或复杂程度如何，都能进行不间断的高速打印。\n（600 mm/s 为 H2D 稳定打印最高速度，65 mm³/s 为高流量热端极限流量。 ）"}},"more":{"card1":{"sectionTitle":"全硬化钢挤出机与喷嘴","title":"耐磨抗造，打印可靠","desc":"H2D 的挤出系统和喷嘴是由硬化钢制成，具有出色的耐用性和耐磨性。专为长期稳定地打印高性能纤维增强材料而设计。"},"card2":{"sectionTitle":"全金属机身 \u0026 压铸框架","title":"高速也精准","desc":"一体化压铸铝合金框架，结构坚固稳定，为高速、大尺寸打印提供刚性基础，最大限度减少了结构微变形造成的精度损失。"},"card3":{"sectionTitle":"快拆热端","title":"啪嗒一扣，更换热端","desc":"只需简单开关锁扣，真正实现无工具、不麻烦的热端更换 —— 整个过程无需拔插线缆，就是那么简单、快速、方便。"}}},"safety":{"chapter":{"title":"确认安全！","desc":"H2D 全面升级安全设计，为您带来更安心的使用体验。通过灵活调用机身中的各类传感器，H2D 具备更灵敏的主动安全防护，将安全隐患扼杀于萌芽。同时，专为激光和高性能耗材打印设计的空气循环系统与激光安全防护，确保用户在任何工况下都能获得最佳安全保障和最优使用情境。"},"section":{"1":{"title":"激光安全防护","desc":"H2D 激光版配备标准激光保护视窗，让用户可以安全地观察激光操作。此外，所有舱门都配有传感器，如在激光工作期间打开舱门，系统会自动触发紧急暂停，确保用户安全。"},"2":{"title":"急停开关 \u0026 蜂鸣报警器","desc":"H2D 配备符合安规要求的急停开关和蜂鸣警报器，帮助用户快速识别安全问题，更方便地暂停机器的运行。"},"3":{"title":"整机内部防火","desc":"H2D 腔体内部采用阻燃材料，提供全面的被动防火安全保护。"},"4":{"title":"火焰传感器","desc":"H2D 机舱内安装了火焰传感器，能够即时感知火情，并通过消息推送和蜂鸣器迅速发出警报，将危险控制在最小范围内。"},"5":{"title":"自动灭火装置","desc":"可选装二氧化碳灭火装置，与火焰传感器联动，即时扑灭火焰，为安全加护。"},"6":{"title":"多传感器闭环温控","desc":"H2D 具有针对所有加热部件的闭环温度控制系统，可根据实时传感器数据不断调整温控。确保稳定精确的热管理，让设备始终在最佳温度下高效运行。"},"7":{"title":"自适应空气循环","desc":"H2D 的自适应空气循环系统，采用三组风门与进排气格栅组合控制，实现多重空气处理模式，精准匹配各类工况需求。系统支持内外循环智能切换，并可通过内部风门自由选择空气过滤或加热，高效解决激光加工热量粉尘、3D 打印腔体加热有害气体过滤、腔内温度控制等多重难题，为全能智造中心提供定制化空气质量解决方案。"},"8":{"title":"离线与云端平权","desc":"\u003cgreen\u003e支持云端连接的同时，H2D 也支持本地局域网模式和物理连接操作\u003c/green\u003e。你可以在不连接因特网的情况下控制打印机、发送切片、更新固件。对于喜欢捣鼓的用户，开发者模式也让你可用第三方配件和软件通过 MQTT 连接和操控打印机。"}}},"ams":{"section":{"1":{"title":"AMS，进化！","desc":"全新升级的\u003cgreen\u003e第二代 AMS\u003c/green\u003e 系统，由 \u003cgreen\u003eAMS 2 Pro\u003c/green\u003e 与 \u003cgreen\u003eAMS HT\u003c/green\u003e 组成，采用\u003cgreen\u003e伺服无刷送料电机\u003c/green\u003e，大幅提升耗材送料效率，为多色多材料打印加速。更棒的是，第二代 AMS 在密封系统内新增了耗材烘干功能，借助\u003cgreen\u003e主动风门\u003c/green\u003e，大大提高烘干效率，并让耗材长时间保持最佳状态。","card":{"1":{"sectionTitle":"重新定义个人智造","title":"拓竹 AMS 2 Pro","buttonText":"了解更多"},"2":{"sectionTitle":"重新定义个人智造","title":"拓竹 AMS HT","buttonText":"了解更多"}}},"2":{"title":"你为什么需要一台多合一制造中心","card":{"1":{"sectionTitle":"更精准的温湿度传感器，读数更清晰。","title":"解锁复合工艺带来的创造可能性"},"2":{"sectionTitle":"Space Saving","title":"多合一机器减少空间占用，为你的工作室腾出更多空间"},"3":{"sectionTitle":"More Bang-for-the-buck","title":"买一台机器，获得四台机器的价值"}}},"3":{"title":"耗材烘干，快速而智能","section":{"1":{"sectionTitle":"既能烘得干，又能存得住","title":"自研行业首创的电磁风门，根据需求主动开合。在烘干模式下可根据温湿度情况自动打开风门，排出湿气。在保存模式下自动关闭来保证气密，防止湿气进入。"},"2":{"sectionTitle":"自旋转均匀烘干","title":"烘干过程中，料盘会自动进行转动，让烘干效果更均匀。"},"3":{"sectionTitle":"RFID 自动参数匹配","title":"使用拓竹官方耗材时，AMS 2 Pro 可借助 RFID 自动匹配烘干设置，无需手动设定。"}}},"4":{"title":"加速，加速！更快的多材料打印","cards":{"1":{"title":"强劲拓竹自研永磁同步伺服电机，送料速度提升 60%。"},"2":{"title":"平均每百次换料节省 10 分钟时间。"},"3":{"title":"更快的多色打印"}}},"5":{"title":"设计细节全面进化","section":{"1":{"sectionTitle":"徒手即可维护料管","title":"在处理断料、卡料等问题时，一代 AMS 需要取料盘、拆螺丝、翻出五通结构，花 3-5 分钟才能排除问题。而现在，无需拆卸即可看见 AMS 2 Pro 的料管，按压按钮即可释放料管，30 秒处理完毕。"},"2":{"sectionTitle":"陶瓷进料口","title":"维氏硬度达到 1200 的陶瓷材质进料口，显著提升耐用度。"},"3":{"sectionTitle":"Direct Drive Feeding","title":"Brushless motor drives the feeding directly, eliminating gear noise"},"4":{"sectionTitle":"精准温感","title":"更精准的温湿度传感器，读数更清晰。"}}}}},"priceContent":{"title":"拓竹 H2D","desc":"重新定义个人智造","buttonText":"立即购买"},"note":{"1":"曲面雕刻功能会在上市后通过固件升级的方式更新。","2":"旋转轴附件为可选购配件，将在产品上市一段时间后于官方商城销售。","3":"烟尘净化器为可选装配件，官方商城有售。","4":"俯视摄像机仅在激光版机器上标配，普通版机器可通过安装激光升级套装升级。","5":"耗材自动识别只对拓竹官方耗材生效。","6":"如需使用运动精度增强功能，需要另外选购视觉精度编码板。","7":"自动轴孔补偿需要在 Bambu Studio 中启用功能，并使用对应的官方耗材方可生效。","8":"350mm × 320mm × 325mm 打印体积需要在两个喷嘴都使用同种耗材的情况下才可以达成。","9":"高流量热端为选配配件，官方商城有售。","10":"自动灭火装置为选装配件，将在产品上市一段时间后于官方商城有售。","11":"出于功能安全性考虑，开发者模式不能用于激光与数控切割功能。","12":"由衷感谢：Automata by @Ross McSweeney; Hand Bag by @file4laser; 3D Printed Shoes - WhaleBerry @CloudBerry; Butterfly Lamp @Darts_3D; Bike Saddle @八宝; Bike Helmet @CloudBerry; Assassin Armor @寺工; Birthday Card @Viktor Losev; Automata by @Ross McSweeney; Birthday Card @popupcardKagisippo; MOCA Pro by @thrutheframe; AirPods Max Case by @设计发射塔; Tesla Model S Plaid by @Mr.Rod; 小米Su7 Ultra Prototype @大匠","title":"注释：","0-1":"2个伺服电机包括：H2D 上的挤出电机和 AMS 2 Pro 上的送料电机。","8-1":"磨料检测对不同的耗材支持可能有所差异，以实际功能为准。","9-1":"600mm/s 打印速度由拓竹哑光 PLA 测得。","10-1":"用于低温打印的过滤模式为可选功能，预计最快将于 2026 年第一季度上线。","11-1":"消息推送功能需要使用拓竹云服务","11-2":"创作者项目仅供演示说明之用。拓竹不对创作者项目做出任何保证，并拒绝承担与之相关的任何延伸责任，包括但不限于基于此类项目进行3D打印作品的安全性、适销性或可用性。更多信息请参阅我们的服务条款。","11-3":"H2D双头打印与AMS的连接关系是一一对应的，同一台AMS中的耗材只可被运用在AMS连接到的那一个热端上。"},"techTitle":"Bambu Lab H2D - 技术参数"},"h2dPro":{"header":{"overview":"产品概览","specs":"技术参数","faq":"常见问题","contactUs":"联系我们"},"printer":{"name":"拓竹 H2D Pro"},"banner":{"title":"专业级双头3D打印解决方案","contactUs":"联系我们","findReseller":"寻找经销商"},"chapter":{"service":{"1":{"sectionTitle":"更专业的网络连接方案","title":"支持以太网有线连接，无线网络升级 WPA2-Enterprise 安全协议","desc":"H2D Pro配备了以太网口，支持使用实体网线连接您的打印机与控制设备。在复杂信号环境中，使用有线网络连接更为稳定安全。针对无线网络连接，H2D Pro加入了对 WPA2-Enterprise 协议的支持，包括EAP-PEAP/EAP-TLS/EAP-TTLS。H2D Pro 还装备了实体网络开关，能独立物理断连无线网关，以应对更加严苛的网络安全需求。"},"2":{"sectionTitle":"企业用户定制服务","title":"可为企业用户的特殊需求提供定制化群控解决方案","desc":"拓竹可为企业用户提供专业的支持，定制开发高效稳定的打印机群控工具，满足企业用户业务上的功能拓展需求。我们的专业软件研发团队将全程为客户的开发工作提供技术支持，助力企业实现所需的定制化功能。(更多细节，详询当地经销商）"},"3":{"sectionTitle":"专属客服团队","title":"最大限度降低由于故障带来的机会成本损失","desc":"我们的专属客服团队在工作日提供快速响应，精准定位问题并给出专业的解决方案。对于需要现场服务的需求，我们配备本地化团队上门解决。此外，针对需要返厂维修的设备，本地团队还可以为您安排备用机器，确保您的业务运营不中断。"}},"dualNozzle":{"1":{"sectionTitle":"多材料打印","title":"混搭柔性和刚性耗材、低成本和特殊耗材","desc":"在单次打印中，结合柔性和刚性耗材，创造出令人叫绝的互锁结构和超越传统的创新设计。合理搭配高性能耗材与普通耗材，仅在必要时使用高性能耗材，降低打印成本、提高耗材效率。"},"2":{"sectionTitle":"专用支撑耗材","title":"打印支撑更高效，支撑面更完美","desc":"打印支撑不再是难题。活用 H2D Pro 的双喷嘴配置，其中一个喷嘴可被支撑耗材打印，从而提升打印稳定性和支撑接触面质量。"},"3":{"sectionTitle":"高效多色打印","title":"更快更省料的多色打印","desc":"双喷嘴打印可减少多色打印中的冲刷。H2D 的智能算法可计算最佳的耗材使用率，最大程度地提高双喷嘴效率，节省时间和材料。"},"title":"双喷嘴系统，效能提升利器"},"highTemperature":{"1":{"sectionTitle":"350°C高温热端","title":"高性能耗材打印更从容","desc":"H2D Pro配备最高350°C的高温喷嘴，从容打印更多高性能耗材，如 PPA-CF/GF、PPS 和 PPS-CF。这些高性能耗材具备更稳定的机械强度与耐温性，为您的项目提供更多可能性。"},"2":{"sectionTitle":"65°C主动腔温加热及控制","title":"减少堵头、翘曲，增强层间结合力","desc":"H2D Pro配备 65°C 主动腔温加热和自适应空气循环。系统可通过主动风门控制内外循环智能切换，针对耗材类型智能控制打印腔温。这套先进机制可防止打印低温材料时堵头，抑制高性能材料的翘曲和变形、提升层间粘接，最大限度地发挥各类型耗材的优势。"},"3":{"sectionTitle":"工具头散热增强风扇","title":"提高低软化温度耗材打印可靠性，避免堵头、挤出磨料","desc":"工具头前壳新增高性能离心风扇，带走挤出机和热端散热片的热量。通过智能温度控制，改善恶劣工况下可能带来的堵头和挤出阻塞，打印机建议工作环境温度提升3°C。"},"title":"专业级高温打印解决方案"},"components":{"1":{"sectionTitle":"碳化钨硬质合金增强喷嘴","title":"更高硬度，更强耐磨","desc":"常规硬化钢喷嘴洛氏硬度HRA 74，H2D Pro配备的碳化钨喷嘴洛氏硬度提高至HRA 90，具有更出色的耐磨性。打印高性能纤维增强耗材时，碳化钨喷嘴的寿命增加50%。"},"2":{"sectionTitle":"标配视觉编码系统","title":"50微米极致运动精度","desc":"标配超高精度视觉编码板，结合 5µm 分辨率光学测量对工具头运动情况进行校准，使 H2D Pro 能够在整个工作空间内实现一致、可靠的、与运动距离无关的 50µm 运动精度，为产出高精度的打印件打下坚实基础。"},"3":{"sectionTitle":"高性能空气过滤系统","title":"有效过滤 3D 打印中产生的颗粒物及气味","desc":"高性能滤芯由 G3 初效过滤器、H12 HEPA 滤芯和高性能椰壳活性炭滤芯复合而成。复合滤芯能够有效过滤打印过程中产生的颗粒物及气味，显著提升在密闭空间中 3D 打印机的使用体验。"}},"box":{"title":"包装内容物","items":{"1":"拓竹 H2D Pro","2":"拓竹 AMS 2 Pro","3":"拓竹 AMS HT","4":"视觉编码板","5":"急停按钮","6":"纹理PEI打印板"}}}},"h2c":{"header":{"overview":"产品概览","diveIn":"深入了解","showcase":"展示","specs":"技术参数","faq":"FAQ","buy":"立即购买"},"printer":{"name":"拓竹 H2C","learnMore":"了解更多"},"banner":{"title":"出色，无需妥协","buyNow":"立即购买","watchVideo":"观看视频","bannerAlt":"拓竹 H2C 多合一 3D 打印机"},"iconSection1":{"title":"变革生产力，造物新体验"},"models":{"1":{"title":"告别手工上色，一次打印七色成型","name":"双生盗龙","author":"@FireBird(Sophie)","printing":{"title":"废料更少的多色打印","desc":"给复杂模型手工上色即将成为过去式，而 H2C 会让你的设计栩栩如生 —— 支持六色切换打印，并配备第七个喷嘴用于支撑材料或额外颜色，实现真正的一体多彩打印。本模型分为两部分打印，龙身共 6 色，地台共 6 色。"}},"2":{"title":"以最少的浪费，让创意栩栩如生","name":"拓竹赛车","author":"@Mr.Rod","printing":{"title":"废料更少的多色打印","desc":"带炫酷拉花的赛车？直接打印出来！\n无需繁琐手绘上色，再也没有骇人的耗材浪费。"}},"3":{"title":"七色一体成型打印，无需上色","name":"布莱里奥・轻骑 - XI","author":"@疯景CrazyJN","printing":{"title":"废料更少的多色打印","desc":"一架动漫风的全彩螺旋桨飞机 —— 不用画笔、不用胶水、省心省力。只需装好耗材，就能轻松打印出惊艳的一体成型模型。"}},"4":{"title":"刚性零件与柔性关节一体打印","name":"重型次核心机甲","author":"@Kit Crafters","printing":{"title":"多色部件集成 TPU 关节","desc":"为你的机甲模型打印灵活耐用的 TPU 球形关节 —— 经得起无数次姿势调整与把玩。"},"materials":{"1":{"name":"AMS 专用 TPU","desc":"关节"},"2":{"name":"哑光 PLA","desc":"主体"}}},"5":{"title":"无需组装 —— 多材料一体成型打印","name":"莫比乌斯机架","author":"@极尘悦","printing":{"title":"废料更少的多材质打印","desc":"借助 H2C，你可以在一次打印中至多使用七种不同的耗材，而无需废料冲刷。在一个模型中融入多材料特性，让一体化设计更上一层楼。"},"materials":{"1":{"name":"PA6-GF","desc":"结构刚性"},"2":{"name":"AMS专用TPU","desc":"抗冲击"},"3":{"name":"阻燃PC","desc":"阻燃"}}},"6":{"title":"为柔性打印增添色彩。","name":"彩色球鞋","author":"@CloudBerry","printing":{"title":"多色TPU打印","desc":"为 3D 打印鞋注入缤纷创意。有了 H2C，你可以将 TPU 90A 与 TPU for AMS 混合打印，制作独一无二的柔性多色打印运动鞋。"},"materials":{"1":{"name":"TPU 90A","desc":"主体"},"2":{"name":"AMS专用TPU","desc":"配色方案 \u0026 抗扭"}}},"purgeWaste":"废料+擦料塔","printTime":"打印时长"},"whatVortek":{"chapterTitle":"Vortek 热端切换系统","cards":{"1":{"title":"超低废料的多材质打印","desc":"在传统单喷嘴的多材料打印过程中，打印机需要通过冲刷来清除换料时热端中残留的耗材。Vortek 系统则不然 —— 它可以直接更换整个热端，实现更快速、更干净的多材质打印，并最大程度减少废料。"},"2":{"title":"全自动耗材切换与管理","desc":"Vortek 系统可与我们高度可靠的 AMS（自动送料系统）无缝配合，使整个换料过程完全自动化——无需手动将每根耗材装入工具头。"},"3":{"title":"始终提供最高效的耗材映射","desc":"Vortek 系统可以将耗材信息存储在热端中，确保每个热端匹配正确的耗材。如果使用超过七种颜色的耗材打印，系统还能计算出最佳映射组合，以最大限度降低冲刷废料。"}}},"whyVortek":{"chapterTitle":"Vortek 强在哪里？","cards":{"1":{"title":"更小空间占用，更多种耗材切换","desc":"由于只需更换热端，该系统最多可容纳六个可替换热端，而不会显著减小打印尺寸。这意味着你可在一次打印中，使用更多的耗材和颜色、实现更多的可能性。"},"2":{"title":"8 秒感应加热","desc":"行业领先的感应加热技术可在 8 秒内将喷嘴加热至工作温度，与传统加热形式相比，大幅缩短每次换料的预热时间。"},"3":{"title":"可靠无接触设计","desc":"出于对可靠性的高要求，H2C 放弃了易受氧化和接触不良影响的接触式金属触点，而开发了一种非接触式解决方案，可确保稳定的高频连接 —— 这是实现精准温控和智能热端同步的基础。"},"4":{"title":"封箱结构，高性能耗材不妥协","desc":"凭借全封箱设计和自适应空气循环系统，H2C 可为高性能材料维持稳定的腔温，同时过滤空气，保持工作环境清洁安全。"},"5":{"title":"色彩不再为工具头数量所限","desc":"与经典换头打印机颜色数量受工具头数量限制不同，H2C 通过连接的 AMS 系统，支持单次打印使用多达 24 种耗材。其智能算法可优化耗材与热端的分配，在减少冲刷废料的同时，也可实现出色的多色多材料打印效果。"},"6":{"title":"全自动多喷嘴偏移校准","desc":"全自动感应热端偏移校准，无需手动操作、无需校准板、无需额外设置。只需几分钟，H2C 即可将喷嘴偏移量精确校准到 25μm 以内。*"},"7":{"title":"为特殊耗材匹配专用热端","desc":"Vortek 系统允许将系统内的热端与特定耗材绑定，使其专用于特定耗材，以确保工程耗材打印的一致性和可靠性。每个热端甚至可以自动存储耗材信息，下次载入该耗材时，Vortek 系统会立即帮你匹配到正确的热端。"}}},"iconSection2":{"title":"不是玩具，而是硬核生产力"},"chapters":{"1":{"title":"一贯卓越的打印质量","sections":{"1":{"title":"挤出力提升 70% \u0026 实时问题检测","desc":"PMSM 伺服挤出电机可提供高达 10kg 的最大挤出力 —— 比步进电机高出 70%，显著提升高流量挤出的稳定性。拓竹专有的伺服挤出系统智能执行 20kHz 的电流与位置信号采样，实时主动检测耗材磨料和堵塞。"},"2":{"title":"50 µm 极致运动精度*","desc":"借助视觉编码板，H2C 实现了 50μm 以下、不受移动距离影响的运动精度。在校准过程中，它会自动补偿机械误差，确保随着时间的推移，打印机仍能保持一致的精度和卓越性能。"},"3":{"title":"表面平滑，细节锐利","desc":"利用挤出机上伺服电机的传感能力和喷嘴上的高分辨率涡流传感器，在打印开始前，H2C 可通过测量喷嘴内熔融耗材的形变和校准每条耗材的 PA 参数来精确控制挤出，从而提高表面平滑度和棱角锐利度。","on":"开启","off":"关闭"}}},"2":{"title":"工程材料，不在话下","sections":{"1":{"title":"为榨干高性能耗材的性能而生","desc":"系统中共七个热端最高都可升温至 350°C，任意一个喷嘴都能打印拓竹全系列耗材。"},"2":{"title":"65°C 主动腔温","desc":"H2C 配备 65°C 主动腔温加热，可最大程度抑制模型翘曲和变形，同时增强高性能、高温耗材的层间结合力。"},"3":{"title":"一流空气过滤系统","desc":"H2C 的三层过滤系统对打印工程耗材打印来说的非常关键。G3 初效过滤器、H12 HEPA 滤网以及椰壳活性炭滤芯组成强强联手，可有效减少工程材料打印过程中产生的异味和有害颗粒物。"}}},"3":{"title":"AI 辅助让使用更简单","sections":{"1":{"title":"全方位打印问题监测","desc":"H2C 配备了 59 个传感器*阵列和 4 摄像头计算机视觉系统，由拓竹独家神经算法协同调控，可敏锐检测到打印过程中的细微异常，实时智能诊断问题。无需成为打印机问题的专家，因为 H2C 可自主为你查明问题。"},"2":{"title":"喷嘴摄像头","desc":"H2C 配备了带微距镜头的 AI 喷嘴摄像头。智能监控系统持续跟踪挤出状态，即时检测耗材堆积、耗材挤出偏差和挤出故障。","tabs":{"1":"炒面","2":"裹头","3":"空打"}},"3":{"title":"AI 全自动启始检查","desc":"在每次任务开始前，H2C 的视觉系统都会启动全面的打印前检查 —— 扫描舱内是否有杂物，并确认初始设置，确保每次打印准确无误地开始。"}}},"4":{"title":"确认安全！","sections":{"1":{"title":"整机内部阻燃","desc":"H2C 腔体内部采用阻燃材料，提供全面的被动防火安全保护。"},"2":{"title":"多传感器闭环温控","desc":"H2C 具有针对所有加热部件的闭环温度控制系统，可根据实时传感器数据不断调整温控，确保稳定精准的热管理，让设备始终在适宜温度下高效运行。"},"3":{"title":"灵活的联网选择","desc":"支持云端连接的同时，H2C 也支持本地局域网模式和物理连接操作。你可以在不连接因特网的情况下控制打印机、发送切片、更新固件。对于喜欢捣鼓的用户，开发者模式也让你可用第三方配件和软件通过 MQTT 连接和操控打印机。"}}}},"note":{"1":"*所展示的打印时间和冲刷废料数据都由 Bambu Studio 计算得到。","2":"* The advertised Vortek features \u0026 advantages are based on fully utilizing 6 induction hotends of same diameter and corresponding AMS units.","3":"*H2C 的所有产品数据均来自于拓竹的内部测试。实际结果可能因产品个体差异、用户使用习惯和环境条件而异。请以实际使用情况为准。","4":"*如需使用运动精度增强功能，须于拓竹官方商城另外选购视觉精度编码板。","5":"*自动轴孔补偿需要在 Bambu Studio 中启用功能，并使用对应的官方耗材方可生效。","6":"*灵玑挤出机的磨料检测功能受具体耗材类型限制。","7":"*“59 个传感器”指配备俯视摄像头及 6 个感应热端的 H2C 多色激光全能版。","8":"*高流量热端为选装配件，可于拓竹官方商城购买。","9":"*由于安全协议，开发者模式不能用于激光与数控切割功能。","10":"*推送通知需要使用 Bambu Handy 并保持云端连接。","11":"*创作者项目仅供示例参考。拓竹不为创作者项目提供任何背书，也不就创作者项目作出任何陈述或保证，包括但不限于基于此类项目的任何 3D 打印作品的安全性、市场性或可用性。更多信息请参阅我们的服务条款。","12":"*感应热端 8 秒加热数据基于拓竹基础 PLA 的打印温度测得。","13":"* “无冲刷”概念不包括耗材首次进入热端时产生的初始冲刷。","14":"* 阻燃腔体采用 UL94 V-0 级材料制成。","15":"* 所有感应热端均提供 24 个月内一次的更换服务。详情请参阅政策页面。","16":"*特别鸣谢以下的模型创作者和他们精彩的模型：双生盗龙 @FireBird(Sophie)，拓竹赛车 @Mr.Rod，布莱里奥・轻骑 - XI @疯景CrazyJN，重型次核心机甲 @KitCrafters，莫比乌斯机架 @极尘悦，解剖肾模型 @Azrael，植物细胞 @suezou，电动车充电枪 @拓竹。","title":"注释："},"showcase":{"model":{"title":"H2C 创意模型","desc":"充分释放\u003ckeywords\u003e多色、多材料\u003c/keywords\u003e打印的潜力 —— H2C 将革新创作 3D 打印项目的方式。\n更多色彩，更强大的集成能力 —— 欢迎来到\u003ckeywords\u003e个人制造\u003c/keywords\u003e的新时代。","download":"下载","models":{"1":{"name":"双生盗龙 @FireBird(Sophie)"},"2":{"name":"莫比乌斯机架 @极尘悦"},"3":{"name":"重型次核心机甲 by @Kit Crafters"},"4":{"name":"布莱里奥・轻骑 - XI @疯景CrazyJN"},"5":{"name":"拓竹赛车 @Mr.Rod"}}}}},"p2s":{"header":{"overview":"产品概览","diveIn":"深入了解","showcase":"展示","specs":"技术参数","faq":"FAQ","buy":"立即购买"},"printer":{"name":"拓竹 P2S"},"banner":{"title":"再一次，成为经典","buyNow":"立即购买","watchVideo":"观看视频","imgAlt":"拓竹 P2S 多色 3D 打印机"},"typingSection":{"title":"再一次，成为经典。","desc1":"\u003ckeywords\u003e拓竹经典之作 P1S 革新了 3D 打印行业。凭借其速度、可靠性、高性价比，P1S 成为了 3D 打印农场和爱好者的优选，也掀起了整个 3D 打印行业的流行浪潮。\u003c/keywords\u003e","desc2":"\u003ckeywords\u003e在过往的积淀之上，新一代拓竹 P2S 现搭载了拓竹第二代技术，精益求精，致力于为用户带来更好的综合体验，并持续带来拓竹特色的卓越打印质量。\u003c/keywords\u003e"},"swiperSections":{"user":{"title":"是什么，让 P 系列成为经典？","cards":{"1":{"user":"Califryburger","desc":"“我从 beta 版本就开始使用 P1 系列打印机了。拓竹的生态系统就像 3D 打印领域的苹果，打印机、切片软件、APP 和云服务都能无缝协作。这让我能更快地迭代模型，并降低材料成本。我的 P1S 设备和其他 P1 系列机器在两年半的时间里一直坚如磐石，现在运行起来还像刚买时一样。”"},"2":{"user":"The Duty Printer","desc":"“（这次打印）本不应该成功的，但它还是做到了！我忘了给模型顶部的巨大桥接加支撑，但我的老 P1S 还是做到了！280mm × 225mm 的框架，1mm 宽的接触面积。”"},"3":{"user":"War_Poodle","desc":"“自从入手 P1S 以来，我一直震惊于原来尝试新的耗材这么方便。我姐姐给我发了一个洞洞鞋的模型文件，我试着用普通 TPU 来打印，没做任何调整。十二个小时后，她就穿上了打印的洞洞鞋，还声称“比真的洞洞鞋还舒服”。从一个想法到一件可穿戴的打印成品，过程竟如此简单，太神奇了！”"},"4":{"user":"TaterTotterer1","desc":"“我的 6 台拓竹 P1S 已经用了有几年了，它们一直非常稳定。非常好维护，打印质量也始终出色。它们在一个又一个小时、一次又一次打印中的一致性给我留下了深刻印象。对我来说，可靠性很重要，而P1S 每次都能做到。”"},"5":{"user":"DerangedKangaru","desc":"“今天，我家孩子把我的工作台弄翻了，我的 P1S 和 AMS 被摔到了车库的另一头，玻璃碎得到处都是，前屏幕也坏了，打印机和 AMS 看起来就像被轰炸了一样。我把打印机放回工作台，插上电源，发送了一个打印任务，想看看到底坏得有多严重。结果打印没有任何问题。我真的对P1S的工程设计感到惊叹。”"}}},"media":{"cards":{"1":{"desc":"“拓竹又一次做到了，推出了一款近乎无懈可击的打印机，其速度、打印质量和应对各种耗材的能力都给我们留下了深刻印象。”"},"2":{"desc":"“拓竹 P1S 在很多不同的场景下都很值得推荐。对于初学者来说，它带来了一种简单的体验，用户无需付出太多努力或具备太多先验知识就能获得出色的打印成果。对于经验更丰富的创作者来说，当你需要快速获得高质量打印时，它是一台可靠的机器，几乎不需要太多干预。”"},"3":{"desc":"“综合来看，速度、质量、易用性和价格优势浑然一体，让拓竹 P1S 成为了消费级 3D 打印市场上备受推荐的打印机。”"},"4":{"desc":"“从开箱那一刻起，就可以明显看出，这台打印机从设计到运输过程中的保护措施都经过了精心雕琢。拓竹 P1S 可谓是物超所值。有竞争力的价格、再加上稳定的性能和精心设计的功能，使其成为3D打印爱好者的理想之选。”"}}},"perfection":{"title":"细节成就经典","desc":"P2S 身上有很多为提升用户体验而做
