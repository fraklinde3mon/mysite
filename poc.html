pportTicketLink\u003eplease submit a Support Ticket\u003c/SupportTicketLink\u003e.","desc1":"For general issues such as orders, shipping, delivery (e.g., package lost, damaged, or missing items), account issues, or for technical issues related to printers, AMS, filaments, Maker's Supply, or print quality, \u003cSupportTicketLink\u003eplease submit a Support Ticket\u003c/SupportTicketLink\u003e.","desc2":"For registration or login issues (e.g. account access), \u003cAccountIssueLink\u003eplease contact us here\u003c/AccountIssueLink\u003e."},"banner":{"title":"We're here to help!","desc":"Our international support team is ready to answer your questions and provide assistance, to quickly address your requests.","buttonText":"Contact Us"},"title":"Contact Us","list":{"0":{"title":"General lnquiry","desc":"Pre-sale; Product Features; Order-related; Logistics Issue; Account issue; Cooperation; Suggestions."},"1":{"title":"Technical Support","desc":"X1, P1, \u0026A1 Series; AMS; AMS lite; Troubleshooting; Error Code; Maintenance; Handy \u0026 Studio; Filaments."}}},"afterSalePolicy":{"title":"After-sales policy"},"deliveryAndReturn":{"title":"Order Delivery \u0026 Returns","desc":"Delivery information, returns \u0026 refunds policy varies by country and region.","shippingInformation":"See shipping information:","ReturnsAndRefundsPolicy":"See returns \u0026 refunds policy:"},"businessCustomer":{"title":"Support for business customers","desc":"If you are a business/professional customer, please use the details below for dedicated business/professional support."},"faq":{"title":"General Inquiry FAQ","desc":"A comprehensive guide to frequently asked questions about our products.","linkText":"Learn more","list":{"0":{"title":"Corporate Sales","list":{"0":{"ques":"Q1: I want to place a purchase order/ apply for a tax-exemption account(B2B Tax-free account)","ans":"A: Apply for a \u003ca href=\"https://bambulab.com/en/corporate-sales\" target=\"_blank\"\u003etax-exempt account\u003c/a\u003e (B2B) to shop on the official website. Bank transfers are not accepted.\u003cbr /\u003e Submit a \u003ca href=\"https://bambulab.com/en/corporate-sales\" target=\"_blank\"\u003epurchase order\u003c/a\u003e and authorized resellers will assist you in the purchasing process. Bank transfers are accepted."},"1":{"ques":"Q2: I applied for a tax-exempt account. How many days does it take to proceed?","ans":"A: After submitting your application, we will process your B2B account within 3 business days and send you a confirmation email once it's completed. We appreciate your patience, and kindly refrain from submitting duplicate requests."},"2":{"ques":"Q3: I have a tax-exempt account. Why is it still showing taxes?","ans":"A: To access the business account, please click the \u003cb\u003ebutton\u003c/b\u003e in the \u003cb\u003eB2B email\u003c/b\u003e. Once logged in, you can find a green B2B symbol in the top right corner of your page. On the checkout page, the final amount will be displayed as the pre-tax amount."},"3":{"ques":"Q4: Can I get the tax refund after my order has been fulfilled?","ans":"A: Please understand that we are \u003cb\u003eunable\u003c/b\u003e to refund taxes for previous orders if your account wasn't tax-exempt, or if you didn't log in with B2B account during the purchase. We can provide invoices. For a refund, kindly reach out to your local tax agency."},"4":{"ques":"Q5: I need to download the invoice","ans":"The \u003cbutton style=\"outline: none; border: none; background: #1c7cfa; color: #fff; padding:3px; border-radius:3px; font-size: 10px;\"\u003eDownload Invoice\u003c/button\u003e button will appear in your account after the order is fulfilled. Upon delivery of your package, we will also send a confirmation email with a download link for the invoice \u003cbutton style=\"outline: none; border: none; background: #00AE42; color: #fff; padding:3px; border-radius:3px; font-size: 10px;\"\u003eDownload My Invoice\u003c/button\u003e. Please note we cannot provide the invoice before shipment."}}},"1":{"title":"Filament Discount","list":{"0":{"ques":"Q1: Filament discount for everyone","ans":"A: The filaments discount is now available to all customers without credit limits. You can enjoy discounted prices even if you want to purchase more than 8 rolls/month. We've also added a discount option for PETG Translucent. Please note that there is no discount for single-roll purchases. For more pricing information, please check \u003ca href=\"https://store.bambulab.com/pages/bambu-filament\" target=\"_blank\"\u003ethis page\u003c/a\u003e."},"1":{"ques":"Q2: Trails of new filament","ans":"A: By subscribing to Bambu Lab's newsletter, you'll have the chance to participate in trials of new filaments before their official launch."}}},"2":{"title":"Payment","list":{"0":{"ques":"Q1: Failed Payment","ans":"A: The following steps may help to resolve the issue:\u003cbr /\u003e1. Update your billing address: Ensure that the billing address you entered during the payment process matches the address associated with your payment card.\u003cbr /\u003e2. Check your shipping address: Make sure there are no abbreviations or errors in your shipping address that could cause issues.\u003cbr /\u003e3. Try a different payment card: If you have another payment card available, try using it to see if the payment goes through.\u003cbr /\u003e4. Clear browser cache: Clear your browser cache before attempting the payment again.\u003cbr /\u003eIf you have followed these steps and are still experiencing payment failure, we recommend contacting your bank for further assistance."},"1":{"ques":"Q2: What are the available payment options, and is it possible to pay in installments?","ans":"A: For details on payment options and \"Buy now, pay later,\" please check the \u003ca href=\"https://us.store.bambulab.com/pages/payment-help#Menu-Payment-help\" target=\"_blank\"\u003ePayment Help\u003c/a\u003e. We offer various payment options, including credit card payments for quick and secure transactions, installment plans for flexible budgeting, and an e-wallet option for easy checkout with a few taps."},"2":{"ques":"Q3: My card has been charged, but I have not received the order confirmation email.","ans":"A: You can check the order history and order number within \"My account\". The email may have been filtered to your spam folder."}}},"3":{"title":"Order Status","list":{"0":{"ques":"Q1: Change/add products to the original order","ans":"A: Once the order processing has started, we cannot make changes to the order. However, if it has been less than two hours since you placed the order, you can cancel it by visiting the \"My Account\" section."},"1":{"ques":"Q2: Change shipping address for order","ans":"A: If it's been less than 2 hours since your order, we suggest canceling it and placing a new one with the correct details.\u003cbr /\u003eIf it's been over 2 hours, you can contact us to try modifications, but we can't guarantee success.\u003cbr /\u003eOnce processing starts, we can only change the name or house number, not the street, district, or city."},"2":{"ques":"Q3: Is it possible to cancel my order","ans":"A: If it has been less then 2 hours since you placed the order, you can cancel it by going to the \"My Account\" section.\u003cbr /\u003eIf your order is not yet confirmed or has not been shipped with an ETD(Estimated Time of Departure), you can contact customer service to attempt a cancellation.\u003cbr /\u003eOnce an order is confirmed, we cannot make any changes to it. If you still want to cancel, you have the option to refuse the delivery. Please note that in the case of a non-defective return, you will be responsible for the round-trip shipping fees."}}},"4":{"title":"Shipping","list":{"0":{"ques":"Q1: No shipping movement for days.","ans":"A: You can access the latest tracking information for your order \u003ca href=\"https://support.bambulab.com/en/orderInquiry\" target=\"_blank\"\u003eHERE\u003c/a\u003e.\u003cbr /\u003eIf your order hasn't shipped, please check the order confirmation email for the Estimated Date of Departure (ETD). We schedule shipments based on this date, and orders with printers and accessories may be sent separately.\u003cbr /\u003eIf your packages have been shipped, shipping status updates may experience delays, particularly during cross-border transportation or handover to the logistics company."},"1":{"ques":"Q2: My region is not within the store's delivery range. How can I purchase a printer?","ans":"A: Please check with authorized dealers for possible delivery options.\u003cbr /\u003eIf you want delivery to a specific area using forwarding, please note that any product issues or accessory needs can only be addressed to the initially provided address and not directly to your country. Additionally, as the shipment is sent to a third-party address, in case of damage during forwarding, investigation and confirmation may not be possible, leading to potential additional expenses. Therefore, we do not recommend this method.\u003cbr /\u003eLink: \u003ca href=\"https://bambulab.com/dealer\" target=\"_blank\"\u003ehttps://bambulab.com/dealer\u003c/a\u003e"}}}}},"wiki":{"title":"Official Wiki","desc":"The authoritative knowledge source about our products, including but not limited to user manuals, maintenance, troubleshooting, and more.","linkText":"Learn more"},"documentation":{"title":"Documentation and User Manuals","desc":"Download product guides and user manuals. Learn how to get your Bambu Lab printer working to its full potential.","linkText":"See all","download":"Download"},"warranty":{"title":"The Bambu Lab Warranty","desc":"All Bambu Lab printers come with a hassle-free warranty. This includes the repair or replacement and ongoing support of your printer. We want to ensure a great service experience for our customers. For this purpose, we have prepared a warranty statement to inform you of our procedures and how we intend to handle w , and begun a new level of expectations in the industry."},"4":{"text":"I don't want to screw around with a machine, I went to design and bring those designs to life."},"5":{"text":"I cannot wait to see what this team comes up with next."}}},"customizePrinter":{"title":"Made by Bambu Lab Created by You","desc":"Customize and 3D print the side panels of P1P with your magic touch. Select a Modplate template to print or design your one-of-a-kind side panels.","downloadButton1":"Download Modplate","downloadButton2":"Download P1P Model","printer":{"1":"Pixel Modplate","2":"Armor Modplate","3":"Pegboard","4":"Artistry Modplate","1-1":"Flowing Flame","1-2":"Autumn Flowers","2-1":"Lake Blue","2-2":"Meteorite Grey","2-3":"Hot Rod Red ","2-4":"Earth Brown ","3-1":"White","3-2":"Black","4-1":"Bambu Lab Edition","4-2":"Lily"}},"events":{"1":{"title":"\u003c1\u003eComing soon before Christmas.\u003c/1\u003e\u003c2\u003eJoin our waitlist to know when we launch.\u003c/2\u003e","desc":"And receive early bird gifts on launch day!"},"title":"Latest Events","seeMore":"Learn more"},"techSpecs":{"title":"Tech Specs","compare":"Compare all printers","buyNow":"Buy now"},"questions":{"title":"Frequently Asked Questions","learnMore":"Learn more"},"shareContent":{"shareText":"Discuss more about the P1P in the community","facebook":"@bambulab3D launches a new 3D printer P1P! Go check it out.","twitter":"@BambulabGlobal launches a new 3D printer P1P! Go check it out. ","weibo":"Bambu Lab发布了新品3D打印机P1P，快来围观！","emailTitle":"Bambu Lab will be launching a new 3D printer P1P!","emailContent":"Join the waiting list to get notified about it when ready and priority in the pre-order announcement, including early bird gifts on launch day! "},"videoSwiper":{"title":"Ways to Get Started"}},"p1s":{"printer":{"title":"Bambu Lab P1S","desc1":"Fully enclosed body which improves print performance for advanced filaments.","richTitle":"\u003c0\u003eBambu Lab \u003c/0\u003e\u003c1\u003eP1S\u003c/1\u003e","emailSub del created by @Sid Naique","createBy6":"Model created by @3_D_M_A"},"fullAutoCalibrations":{"1":{"sectionTitle":"Full-Auto Calibration","title":"Goodbye to Tedious Manual Calibration And Tuning","desc":"A1 handles various calibrations all by itself. It meticulously calibrates the Z-offset, bed-level, vibration resonance and nozzle pressure for EVERY print job, automatically."},"2":{"sectionTitle":"Auto Bed-Level","title":"Goodbye to Tedious Manual Calibration And Tuning","desc":"A1 handles various calibrations all by itself. It meticulously calibrates the Z-offset, bed-level, vibration resonance and nozzle pressure for EVERY print job, automatically. "},"3":{"sectionTitle":"Auto Z-Offset","title":"No More \"Paper Method\"","desc":"A1 probes the bed with the nozzle to measure the absolute Z-offset. No need to stick a paper as reference."},"4":{"sectionTitle":"Auto Vibration Calibration","title":"Auto Tune Both X \u0026 Y Resonance Before Every Print","desc":"A1 has sensors in toolhead and heatbed. One of the very first bed-slinger printers to run auto resonance calibration on both X \u0026 Y axes.","watchVideo":"Watch video"},"5":{"sectionTitle":"Auto Flow Dynamics","title":"Fully Automated PA (Pressure Advanced) Calibration","desc":"First of its kind, A1 runs the nozzle pressure based flow dynamics calibration algorithm. No need to draw any pattern or get any manual pick \u0026 match involved, A1 handles Pressure Advanced calibration automatically."},"6":{"sectionTitle":"Auto Belt Tension","title":"Auto Monitoring And Adjusting The Belts","desc":"A1 can check the belt tension automatically through the vibration frequency calibration. If the belt tension is loose the HMS system will notify you to adjust the auto belt tensioner."},"7":{"sectionTitle":"Auto Filament Loading","title":"Load/Unload Filament With One Touch","desc":"No manual setting involved, A1 fully automated the filament load/unload process."}},"compensation":{"sectionTitle":"Active Flow Rate Compensation","title":"Print Smooth At Every Corner, Always","desc":"The A1 revolutionizes flow control in 3D printing. It utilizes a high-resolution, high-frequency eddy current sensor to measure the pressure in the nozzle. Our algorithm actively compensates the flow rate according to the readings to extrude with accuracy."},"highSpeedPrecision":{"sectionTitle":"High-speed Precision","title":"Bed Slinger with CoreXY Speed And Quality","desc":"Full-metal Rails, Rigid frame, nozzle pressure sensor, accelerometers, powerful MCU, and above all, an advanced motion control system that utilizes these features to print a 14-minute benchy with quality and following all the speed benchy rules straight out of the box without using specialized filaments."},"intuitiveUI":{"sectionTitle":"Intuitive UI","title":"As Easy As Your Smart Phone","desc":"A1 now has a simplified touchscreen UI system that walks you through all the hurdles. You don't have to be a 3D printing expert to use the A1. "},"worryFreePrinting":{"sectionTitle":"Worry-free Printing","title":"Start And Relax","desc":"Bambu Lab printers are well known for the worry-free printing experience that has been widely praised by our fantastic userbase. Check out what our users have to say about our printers on the market!","comment":{"1":"The A1 Mini is an exceptional printer, very quiet, very good print quality. I have just printed the Bambu Lab Christmas Cabin on it, it took around 19 hours to print on 9 plates and 3 hours to glue it together, but it is very nice. Even the very small items stick very well to the bed. ","2":"Well finally finished a larger print! Printed most of this one with the A1 mini since the P1P was turning into a P1S. Lol. Turned out awesome! Printed at a 100% and it’s pretty big! Printed amazing! Now I need a good shelf to display it!","author1":"——Facebook User Group","author2":"——Facebook User Group"}},"makerWorld":{"sectionTitle":"MakerWorld","title":"1-Click Away From Printing","desc":"Introducing MakerWorld, the next-gen 3D model platform with 1-click printing straight from the Bambu Handy App. In addition to this new platform, you can always use Bambu Studio and Bambu Handy App to manage your printers anytime, anywhere.","learnMore":"Learn more"},"printSilently":{"sectionTitle":"Print Silently","title":"Active Motor Noise Canceling","desc":"Active Motor Noise Canceling and Silent Mode can bring down the noise level to under 48 dB making A1 one of the quietest 3D printers on the market, so you can take a nap while your printer is working hard."},"swiftMaintenance":{"1":{"sectionTitle":"Swift Maintenance","title":"Quick Swap Nozzles","desc":"All-new quick swap hotend design, the hotend pops in and out with just 1 clip. "}},"privacy":{"1":{"sectionTitle":"Privacy","title":"Easy To Use Off The Internet","desc":"If you do not like the concept of Cloud printing, you can use LAN mode for remote control / live view and send jobs to your A1 without the need for cloud communication."},"2":{"sectionTitle":"Privacy","title":"Camera Lens Cover","desc":"Forget about the sticker, physically block the camera with a simple mechanism."}},"reliability":{"sectionTitle":"Reliability","title":"All-Metal Frame, Bearings and Rails","desc":"We spent extra to bring you the most reliable All-metal rails and cover protected drive system. You get Bambu Lab performance out of the box, designed for consistency and longevity."},"cardSection":{"1":{"title":"All-metal Rail System","desc":"The rails are the most important factor affecting the lifespan and accuracy in 3D printers, as they need to ensure the system's rigidity during the printing process, while constantly withstanding the wear brought by high-speed motion. The A1 utilizes all-metal rails, incorporating high-quality linear rail on the X axis, twin all-metal linear rods on the Z axis and a twin row all-metal linear guide on the Y axis. These rail systems ensure that the A1 doesn't require frequent adjustments by the users; regular lubrication alone can guarantee the printer's precision and lifespan."},"2":{"title":"Active Vibration Compensation","desc":"Active Vibration Compensation, similar to Input Shaping found in other firmwares, is the key to fast printing. To compensate for the vibration of the printer, the control system needs to know the vibration characteristics of the system, such as the natural frequency and amplitude of all axes. You can set the parameters when the printer is produced and adhere to them. However, these parameters may drift due to environmental temperature fluctuations, changes in belt tension, or even variations in the mass of the build plate. To guarantee the optimal parameters for superior print quality, we have installed sensors on both the toolhead and the heatbed, allowing for the measurement of the parameters of the X and Y axes before every print."},"3":{"title":"Comprehensive Filament Monitoring","desc":"Everyone knows that a clogged nozzle or a tangled spool of filament can ruin an entire fine print.Traditional filament run out sensor can only cover a limited number of failure scenarios. In the A1 and AMS lite, we have introduced a comprehensive filament monitoring system. This includes a filament tension sensor on the toolhead, a filament position sensor before the extruder, and a nozzle pressure sensor situated between the extruder and the nozzle. Additionally, the AMS lite is equipped with a filament odometer. These sensors, combined with advanced algorithms, can promptly detect potential issues such as filament tangling and breakage, and extruder skipping, safeguarding the quality of each print."},"4":{"title":"RFID Sync","desc":"While AMS lite is compatible with most filaments brands on the market, it uses RFID to detect Bambu Filament with RFID tag, and automatically apply the best suited settings for them. It also enable you to monitor the filament usage, remotely."},"5":{"title":"Full-Auto Leveling","desc":"The A1's full-auto ABL uses nozzle as the probe, which measures absolute distance. Bed leveling is fully automatic with zero manual adjustment needed."},"6":{"title":"Active Flow Rate Compensation","desc":"Unlike the linear and Newtonian movement of the XYZ axes, the viscous flow of the melted plastic is non-Newtonian. The amount of plastic pushed into the hot end by the extruder doesn't necessarily equate to the amount flowing out of the nozzle, especially at high accelerations. This discrepancy can lead to swollen corners and artifacts where the speed changes. This is where active flow rate compensation comes into play. It helps to predict and adjust the flow of the molten plastic, facilitating more accurate extrusion. Previously, we used to print straight lines with acceleration and measure the line's width to calibrate the parameters for compensation - a process that was time-consuming and wasted space on the build plate. In the A1, we employ a novel method to measure the nozzle pressure, allowing us to directly obtain the necessary parameters before each print, saving time and preserving build plate space."},"7":{"title":"Active Motor Noise Canceling","desc":"The stepper motor tends to be noisy, particularly at high speeds. By using the motor drive to inject specific high-frequency movements into the motor, we can negate a substantial portion of the noise, provided we understand the detailed characteristics of each motor. However, every motor has its own unique noise fingerprint. The A1 is equipped with sensors and algorithms capable of identifying the minute individual differences in each motor during calibration. This information is then utilized to cancel out a portion of the noise generated by the motor."},"8":{"title":"Real-time Monitoring","desc":"You can remotely control and monitor your A1 with the Bambu Handy App or Bambu Studio. You can see what's going on even if you're not on site."}},"highlightOverview":{"title":"Highlight Overview","card":{"1":{"title":"AMS lite","desc":"Print Multi-Color"},"2":{"title":"Full-Auto Calibration","desc":"No Manual Adjustment"},"3":{"title":"Active Flow Rate Compensation","desc":"Smooth At Every Corner"},"4":{"title":"High-Speed Precision","desc":"10000 mm/s² Acceleration"},"5":{"title":"Print Silently","desc":"Silent Mode Under 48 dB"},"6":{"title":"Reliability","desc":"Bambu Lab Quality You Can Trust"},"7":{"title":"MakerWorld","desc":"Start Printing With A Single Click"}}},"optionalAMSTopMount":{"sectionTitle":"Optional AMS Top Mount","title":"One More Thing","desc":"For those who want to install their AMS lite unit on top of their A1 printer, we offer the top mount bracket set. This set of printable components allows you to safely mount your AMS lite on top of the A1.","downloadModel":"Download Model"},"techSpec":{"title":"Technical Specifications","name":"A1"}},"a1Mini":{"printer":{"title":"Bambu Lab A1 mini","richTitle":"\u003c0\u003eBambu Lab \u003c/0\u003e\u003c1\u003eA1 mini\u003c/1\u003e","buyNow":"Buy now","preOrder":"Pre-order"},"gallery":{"title":"See What You Can Do \nWith A1 mini"},"amslite":{"desc":"The all-new AMS lite is elegant and reliable, making multi-color 3D printing accessible to everyone."},"plugNPlay":{"sectionTitle":"Plug-N-Play","title":"Turn the once steep learning curve into a enjoyable journey","desc":"The A1 mini comes to you pre-assembled, pre-squared, and pre-tuned with precision. It only takes about 20 minutes to set up for your first print."},"fullAutoCalibrations":{"1":{"desc":"A1 mini handles various calibrations all by itself. It meticulously calibrates the Z-offset, bed-level, vibration resonance and nozzle pressure for EVERY print job, automatically. "},"2":{"desc":"A1 mini handles various calibrations all by itself. It meticulously calibrates the Z-offset, bed-level, vibration resonance and nozzle pressure for EVERY print job, automatically. "},"3":{"desc":"A1 mini probes the bed with the nozzle to measure the absolute z-offset. No need to stick a paper as reference."},"4":{"desc "}},"printSilently":{"desc":"Active Motor Noise Canceling and Silent Mode can bring down the noise level to under 48 dB, making A1 mini one of the quietest 3D printers on the market, so you can take a nap while your printer is working hard."},"privacy":{"1":{"desc":"If you do not like the concept of Cloud printing, you can use LAN mode to remote control / live view and send jobs to your A1 mini without the need of cloud communication."}},"reliability":{"desc":"We spent extra to bring you the most reliable All-metal rails and cover protected drive system. You get Bambu Lab performance out of the box, designed for consistency and longevity."},"cardSection":{"1":{"title":"Linear Rails","desc":"The rails are the most important factor affecting the lifespan and accuracy in 3D printers, as they need to ensure the system's rigidity during the printing process, while constantly withstanding the wear brought by high-speed motion. The A1 mini utilizes all-metal rails, incorporating high-quality linear rails on the X and Z axes, and a all-metal Linear Guide on the Y axis. These rail systems ensure that the A1 mini doesn't require frequent adjustments by the users; regular lubrication alone can guarantee the printer's precision and lifespan."},"2":{"desc":"Active Vibration Compensation, similar to Input Shaping found in other firmware, is the key to fast printing. To compensate for the vibration of the printer, the control system needs to know the vibration characteristics of the system, such as the natural frequency and amplitude of all axes. You can set the parameters when the printer is produced and adhere to them. However, these parameters may drift due to environmental temperature fluctuations, changes in belt tension, or even variations in the mass of the build plate. To guarantee the optimal parameters for superior print quality, we have installed sensors on both the toolhead and the heatbed, allowing for the measurement of the parameters of the X and Y axes before every print."},"3":{"desc":"Everyone knows that a clogged nozzle or a tangled spool of filament can ruin an entire fine print.Traditional filament run out sensor can only cover a limited number of failure scenarios. In the A1 mini and AMS lite, we have introduced a comprehensive filament monitoring system. This includes a filament tension sensor on the toolhead, a filament position sensor before the extruder, and a nozzle pressure sensor situated between the extruder and the nozzle. Additionally, the lite is equipped with a filament odometer. These sensors, combined with advanced algorithms, can promptly detect potential issues such as filament tangling and breakage, and extruder skipping, safeguarding the quality of each print."},"4":{"desc":"While AMS lite is compatible with most filaments on the market, it uses RFID to detect Bambu Filament with RFID tag, and automatically apply the best suited settings for them. It also enable you to monitor the filament usage, remotely."},"5":{"desc":"The A1 mini's full-auto ABL uses nozzle as the probe, which measures absolute distance. Bed leveling is fully automatic with zero manual adjustment needed."},"6":{"desc":"Unlike the linear and Newtonian movement of the XYZ axes, the viscous flow of the melted plastic is non-Newtonian. The amount of plastic pushed into the hot end by the extruder doesn't necessarily equate to the amount flowing out of the nozzle, especially at high accelerations. This discrepancy can lead to swollen corners and artifacts where the speed changes. This is where active flow rate compensation comes into play. It helps to predict and adjust the flow of the molten plastic, facilitating more accurate extrusion. Previously, we used to print straight lines with acceleration and measure the line's width to calibrate the parameters for compensation - a process that was time-consuming and wasted space on the build plate. In the A1 mini, we employ a novel method to measure the nozzle pressure, allowing us to directly obtain the necessary parameters before each print, saving time and preserving build plate space."},"7":{"desc":"The stepper motor tends to be noisy, particularly at high speeds. By using the motor drive to inject specific high-frequency movements into the motor, we can negate a substantial portion of the noise, provided we understand the detailed characteristics of each motor. However, every motor has its own unique noise fingerprint. The A1 mini is equipped with sensors and algorithms capable of identifying the minute individual differences in each motor during calibration. This information is then utilized to cancel out a portion of the noise generated by the motor."},"8":{"desc":"You can remotely control and monitor your A1 mini with the Bambu Handy App or Bambu Studio. You can see what's going on even if you're not on site."}},"mysteryBox":{"1":{"name":"V-Twin Engine"},"2":{"name":"LED Lamp"},"3":{"name":"Marble Run"},"4":{"name":"Wireless Mouse"},"sectionTitle":"Fun Facts","title":"Mystery Box","desc":"A random mystery box is included in the packaging of every A1 mini combo, while supplies last. Good luck!"},"printerMelody":{"title":"Printer Melody","desc":"The A1 mini sings electronic music with no speaker! The A1 mini can drive the 3 motors that generate certain vibration frequencies to play up to 3 sound tracks at the same time. Try with your own MIDI Files with the Web MIDI to GCode Generator so that your A1 mini can show it's appreciation for you with a jingle.","learnMore":"Learn more"},"techSpec":{"title":"Technical Specifications","name":"A1 mini"}},"x1e":{"printer":{"title":"Bambu Lab X1E","richTitle":"\u003c0\u003eBambu Lab \u003c/0\u003e\u003c1\u003eX1E\u003c/1\u003e","desc":"For professionals and engineering applications","contactButtonText":"Contact Us","resellerButtonText":"Find a Reseller","includedAMS":"*AMS included","priceText":"MSRP: {{price}}(before tax)"},"section1":{"sectionTitle":"Stable Ethernet Connection, WPA2-Enterprise Authentication Wi-Fi Connection","title":"Enhanced And More Connection Options","desc":"The X1E offers the option to connect to your devices through its newly added Ethernet port, ensuring robust network communication in complex environments. Ethernet connectivity can also be used in crowded wireless signal environments. Additionally, the X1E provides WPA2-Enterprise Wi-Fi Authentication (EAP-PEAP/EAP-TLS/EAP-TTLS) and individual physical kill switches for both Wi-Fi and Ethernet, meeting stringent network security requirements."},"section2":{"sectionTitle":"Fully Functional With LAN Only Mode","title":"Off-Cloud Operation","desc":"The X1E can operate independently without a connection to Bambu Cloud Service, fully functional within your local network. Customers can remotely control the X1E through LAN communication without requiring an Internet connection. For additional customization details, please contact your regional reseller."},"section3":{"sectionTitle":"Effectively Filter Particulates And VOCs Generated by 3D Printing","title":"Heavy Duty Air Filtration","desc":"We combined a G3 pre-filter, an H12 HEPA filter, and a high-quality coconut shell activated carbon filter to provide optimal air filtration. Enhanced filtration can effectively reduce excessive odors and particulates when printing in less ventilated environments."},"section4":{"sectionTitle":"Reduce Warping, Improve Layer Bonding","title":"Active Heating And Controlled Chamber Temp","desc":"The X1E can actively heat and regulate the chamber temperature. Accurately controlled chamber temperature (up to 60°C or 140°F) improves print quality, especially for filaments prone to warping such as ABS and PC."},"section5":{"sectionTitle":"More Heat For Higher Temperature Materials","title":"320 °C (608 °F) Nozzle Temp","desc":"Higher nozzle temperature make possible to print higher performance materials such as PPA-CF/GF, PPS and PPS-CF. These new materials have better dimensional stability, heat resistance and mechanical performance."},"section6":{"sectionTitle":"Super Fast And Rigid Structure For Continuous High Speed Printing","title":"Robust High Speed CoreXY","desc":"The superior carbon-fiber rods in the CoreXY motion structure enable the X1E to achieve a toolhead acceleration of 20,000 mm/s² by reducing the weight of moving parts. This faster acceleration allows the X1E to maintain its maximum travel speed of 500 mm/s for longer periods, significantly reducing overall print time."},"section7":{"sectionTitle":"Stable \u0026 Quality Prints Even At Higher Speeds","title":"Vibration And Extrusion Compensation","desc":"X1E can actively compensate for XY-axis vibrations and extrusion issues to ensure exceptionally smooth print quality. All measurements are fully automatic, eliminating the need for manual adjustments."},"section8":{"sectionTitle":"Reduce Filament Wastage And Machine Downtime","title":"AI Failure Detection","desc":"The X1E's AI algorithm can detect first-layer imperfections and spaghetti failures with the assistance of Lidar and computer vision. It then automatically pauses the print to prevent catastrophic failures."},"section9":{"sectionTitle":"Supports Auto Filament Reload and Enables Multi-Material Printing with Support Material for Improved Surface Quality","title":"Intelligent Filament Management","desc":"X1E can parallel connect 4 Bambu AMS systems to print with up to 16 spools of filaments, good for printing dedicated support materials for seamless surface and printing multi-color. The AMS system also supports automatic filament reload to make sure you use all the filament on your spool before switching to a new one."},"inTheBox":{"1":"X1E","2":"AMS","3":"Build Plate","4":"PAHT-CF, PLA-CF\nSupport for PA/PET","5":"Replacement Filter","6":"Filament Swatch","7":"Accessory Box","title":"What's in the Box"},"compare":{"downloadText":"Download TDS"},"contactUsModal":{"title":"Contact Us","name":"Full Name","email":"Business Email","job":"Job Title","company":"Com Torque Regulation"},"2":{"keywords":"\u003c 50 μm","title":"Motion Accuracy"},"3":{"keywords":"AI Detection","title":"23 Sensors \u0026 3 Cameras"},"4":{"keywords":"Auto Venting","title":"Filament Drying"},"5":{"keywords":"340×320×340","title":"mm³ Large Volume"},"6":{"keywords":"Up to 30%","title":"Faster Print Speed"},"7":{"keywords":"65 °C","title":"Active Heated Chamber"},"8":{"keywords":"10W 455nm","title":"Laser Cutting"}}},"gallery":{"title":"Your Go-To\nPersonal Manufacturing Hub"},"processType":{"printing":"3D Printing","multiColorPrinting":"Multi-Color \n3D Printing","laserCutting":"Laser Cutting","engraving":"Laser \nEngraving","cutting":"Digital \nCutting","drawing":"Drawing"},"chapters":{"1":{"title":"Accuracy That \nWorks for You","sections":{"1":{"title":"\u003ckeywords\u003eCorrect\u003c/keywords\u003e Mechanical Deviations","desc":"Even the printer comes out of the factory with superb accuracy, mechanical wear and variances over time are inevitable—but now, \u003ckeywords\u003efirst time in the industry\u003c/keywords\u003e, there’s a solution.\nWith the Vision Encoder⁽¹⁾, the H2S achieves distance-independent \u003ckeywords\u003emotion accuracy under 50 μm\u003c/keywords\u003e—thinner than a human hair. During calibration, it automatically compensates for mechanical drift, ensuring consistent precision and peak performance over time."},"2":{"title":"\u003ckeywords\u003eOne Print.\u003c/keywords\u003e Perfect Fit.","desc":"Bambu Lab's Auto Hole/Contour Compensation⁽²⁾ minimizes printing tolerances, delivering machine-shop-level precision for hole dimensions. \u003ckeywords\u003eDesign fit-critical parts\u003c/keywords\u003e with confidence—integrate shafts, bearings, and fasteners without trial and error. Post-print assembly has never been easier."},"3":{"title":"Ready for \u003ckeywords\u003eEngineering\u003c/keywords\u003e Filaments","desc":"Featuring a 350 °C hotend and a 65 °C actively heated chamber, it supports the entire Bambu filament lineup—from PLA and PETG to PC and PPA. With closed-loop fan control and precise thermal management, the H2S minimizes warping and deformation while improving layer adhesion. Build \u003ckeywords\u003elarge, high-performance parts\u003c/keywords\u003e that are as functional as they are strong.","tabs":{"1":"350 °C Hotend","2":"65 °C Heated Chamber"}},"4":{"title":"Even Surfaces, \u003ckeywords\u003eCrisp Edges\u003c/keywords\u003e","desc":"H2S uses both the sensing capability of its servo motor on the extruder and the high-resolution eddy current sensors on the nozzle to precisely control extrusion by measuring nozzle pressure and calibrating PA parameters for each filament, improving surface smoothness and edge sharpness."},"5":{"title":"\u003ckeywords\u003ePrecision\u003c/keywords\u003e in Motion","desc":"Active Vibration Compensation neutralizes micro-vibrations and resonance in real time, enabling premium print quality at higher speeds."},"6":{"title":"Print Functional Designs","labels":{"1":"Go-Kart Frame: PAHT-CF","2":"Handbag: TPU for AMS","3":"Seed Starter: PA6-GF","4":"RC Plane: PLA Tough+"}}}},"2":{"title":"Intelligence That's Got Your Back","sections":{"1":{"title":"\u003ckeywords\u003e20,000\u003c/keywords\u003e Checks Per Second","subTitle":"Closed-Loop Feedback, Real-Time Control","desc":"Bambu Lab's proprietary PMSM servo system enables 20 kHz resistance and position sampling to dynamically modulate electromagnetic torque vectors. It stabilizes extrusion and actively detects grinding⁽³⁾ or clogs in real time.","labels":{"1":"Filament grinding","2":"Clogging"}},"2":{"title":"\u003ckeywords\u003e23\u003c/keywords\u003e Sensors + 3 Cameras","subTitle":"Each Potential Risk Has Its Own Detector","tabs":{"1":{"title":"Vision System","desc":"With AI-driven real-time monitoring, the vision system detects clumping, spaghetti and purge chute jamming as they happen, helping prevent failed prints before they start. This same vision system powers advanced features like Live Spatial Alignment, allowing precise laser and cutting calibration, and Vision Encoder technology, which enhances positional accuracy."},"2":{"title":"Feeding","desc":"Filament-path sensors work in unison to monitor feeding speed and position, detect filament tangles and grinding risks, track filament mileage and spool usage, and ensure tool readiness across the AMS, buffer, cutter, and feeding paths, making sure every tool is in place and every move is under control."},"3":{"title":"Thermal Control","desc":"Five NTC temperature sensors are strategically placed across the nozzle, heatbed, and chamber. Paired with integrated airflow sensors, the system actively monitors and adjusts internal temperatures and circulation, maintaining the ideal print environment through real-time feedback control."},"4":{"title":"Safety","desc":"The H2S features five flame sensors, front-door and top-cover sensors, and emergency stop button to form a complete safety system. It detects fire risks, monitors enclosure alignment, and allows instant shutdown when needed—protecting your projects and your workspace at all times."}}},"3":{"title":"Pre-Flight \u003ckeywords\u003eChecklist\u003c/keywords\u003e by AI","desc":"Prior to each operational cycle, the H2S vision system initiates a comprehensive pre-flight checklist: Chamber Integrity Scan – Detects debris across the entire print surface. Hardware Configuration Audit – Instantly identifies build plate properties."},"4":{"title":"\u003ckeywords\u003eFlap Switch\u003c/keywords\u003e Airflow \u0026 Filtration System","subTitle":"3D Printing \u0026 Laser Cutting. 3 Modes, All-in-One","cards":{"1":{"title":"High-Temp Printing","desc":"Chamber sealed. Internal air recirculates through the Air Filter and the heater to stabilize high-temp conditions. Print large engineering parts without warping."},"2":{"title":"Low-Temp Printing","desc":"Top Vent opens to bring in cool air, while maintaining a filtered exhaust⁽⁴⁾. Print PLA and PETG without opening the door, and handle overhangs and bridging with ease."},"3":{"title":"Laser Cutting/Engraving","desc":"Top Vent and Filter Switch Flap open. Fumes are channeled efficiently to the ventilation system, keeping your workspace safe and clean."}}}}},"3":{"title":"Bigger. Faster. Better.","sections":{"1":{"title":"\u003ckeywords\u003eMaximum Volume.\u003c/keywords\u003e Maximum Productivity.","desc":"With a build volume of \u003ckeywords\u003e340×320×340 mm³\u003c/keywords\u003e, the H2S offers the largest print space among all Bambu Lab printers. Your Vision. Fully Realized \u003ckeywords\u003ein One Print.\u003c/keywords\u003e","imgs":{"1":{"title":"120% Larger Build Volume","subTitle":"Than the X1 Carbon"},"2":{"title":"Full Scale Printing","subTitle":"Print bigger, with fewer plates"}}},"2":{"title":"\u003ckeywords\u003eTop Speed.\u003c/keywords\u003e More Reliable Than Ever.","desc":"Bambu Lab’s proprietary PMSM⁽⁵⁾ servo extrusion system delivers \u003ckeywords\u003e67% more extrusion force\u003c/keywords\u003e, providing solid support to high flow⁽⁶⁾ printing. Paired with up to 1000 mm/s toolhead speed and up to 20,000 mm/s² acceleration, your H2S can finally go full throttle—\u003ckeywords\u003ecutting your printing time by up to 30%\u003c/keywords\u003e⁽⁷⁾—while maintaining top-tier quality.","imgs":{"1":{"title":"DynaSense Extruder","subTitle":"PMSM servo extruder delivers up to 10kg of extrusion force—67% more than regular stepper motors, delivering the strongest support for high-flow printing."},"2":{"time":"1 day 7 hours","title":"12.3% Faster Than X1C"},"3":{"time":"1 day 1 hour","title":"11.2% Faster Than X1C"},"4":{"time":"6 days","title":"22.2% Faster Than X1C"}}}}},"4":{"title":"Cut. Engrave. Draw.","sections":{"1":{"title":"Compact. Capable. \u003ckeywords\u003eAll in One.\u003c/keywords\u003e","cards":{"1":{"title":"Live Spatial Alignment","subTitle":"Top-down BirdsEye camera⁽⁸⁾ and onboard toolhead camera enable Live Spatial Alignment, letting you preview the toolpath directly on your material with 0.3 mm accuracy. What you see is what you get."},"2":{"title":"Auto Arrangement","subTitle":"Bambu Suite automatically arranges your project shapes to make the most of every sheet—smart, efficient, and effortless."},"3":{"title":"10W 455nm Laser Power","subTitle":"Slice through up to 5 mm plywood, acrylic, or PU with ease—clean, fast, and precise."},"4":{"title":"Air Assist","subTitle":"Air Assist keeps your lines crisp by blowing away smoke and char while cooling the surface—preventing soot buildup and beam distortion for sharp, clean results."},"5":{"title":"Digital Cutting","subTitle":"Effortlessly cut through paper, vinyl, PU leatherette, and more—clean, accurate, and ready to apply."},"6":{"title":"Drawing","subTitle":"Use the drawing module to automate linework, sketches, or handwritten notes—precise, repeatable, and hands-free."}}},"2":{"title":"Not a Toolkit. \nA Production-Ready Platform."}}},"5":{"title":"Protected Inside \nand Out","sections":{"1":{"title":"Safety, Built In","labels":{"1":{"title":"Laser Safety Window","desc":"Shields your eyes from the 455 nm laser beam while keeping your workspace clear and visible."},"2":{"title":"Five Flame Sensors","desc":"Advanced sensors continuously monitor for fire risks. If an issue is detected, a loud buzzer and mobile alert⁽⁹⁾ notify you immediately—so you can act fast and stay safe."},"3":{"title":"Flame-Retardant Chamber","desc":"Constructed with fire-resistant materials throughout, the chamber provides passive protection for added safety."},"4":{"title":"Emergency Stop","desc":"Immediately halt operations if something feels off—giving you full control and added peace of mind."}}},"2":{"title":"Connectivity, By All Means \n\u003ckeywords\u003ePrivacy, By Design\u003c/keywords\u003e","desc":"The H2S offers seamless cloud connectivity for convenient remote control from any device. For security-sensitive applications, it also delivers complete offline functionality, ensuring physically isolated operation. Users can control the printer, send files, and upgrade firmware—no internet required. Additionally, Developer Mode unlocks MQTT port access, empowering developers and integrators to connect third-party components and custom software with ease.⁽¹⁰⁾"}}},"6":{"title":"Accessible. Comfortable. Made to Last.","sections":{"1":{"title":"Quick-Swap Nozzle","desc":"Swap nozzles in seconds—no tools, no hassle. Whether you're switching to a high flow hotend or a different nozzle size, the redesigned hotend makes it easy and intuitive, even for first-time users."},"2":{"title":"Quiet by Design","desc":"With Active Motor Noise Canceling and specialized air duct noise-reduction technology, the H2S operates \u003ckeywords\u003ebelow 50 dB\u003c/keywords\u003e⁽¹¹⁾. Print overnight or in shared spaces without disrupting your environment."},"3":{"title":"All-Metal, Die-Cast Body","desc":"The integrated die-cast aluminum alloy chassis delivers a sturdy, stable structure that provides a rigid foundation for high-speed, large-format printing, while minimizing accuracy loss caused by micro-twisting."}}},"7":{"title":"Multi-Color Printing and Drying, All-in-One","amsCard":{"1":{"title":"AMS 2 Pro","buttonText":"Learn More"},"2":{"title":"AMS HT","buttonText":"Learn More"}},"sections":{"1":{"title":"Electro-Magnetic Air Vent","desc":"Automated venting facilitates dehumidification during drying and airtight sealing for weeks of quality printing."},"2":{"title":"Auto-Rotate Drying","desc":"During the drying process, the filament spools rotate automatically to provide more even drying."},"3":{"title":"RFID Sync","desc":"AMS 2 Pro uses RFID to auto-match drying settings for Bambu official filaments, no manual input needed."}}},"8":{"title":"Endless Models to Print","sections":{"1":{"sectionTitle":"MakerWorld","title":"Over a Million Models at Your Fingertips","desc":"On \u003ckeywords\u003eMakerWorld\u003c/keywords\u003e, you'll find an endless supply of great models, all ready for your H2S. With \u003ckeywords\u003eseamless integration\u003c/keywords\u003e, you can skip the hassle of figuring out settings or slicing. The perfect print profiles for your specific printer and filaments are already in place. Simply \u003ckeywords\u003ehit print and get started!\u003c/keywords\u003e This kind of effortless printing is standard on MakerWorld, so you'll always have something new to try, and your printer can keep busy!"},"2":{"sectionTitle":"MakerLab","title":"AI Assisted 3D Modeling Tools, Bring Your Vision to Life","desc":"Transform your favorite artwork into a personalized lightbox, turn a beloved photo into a relief sculpture, or create one-of-a-kind PrintMon figurines from a simple prompt. With Bambu Lab MakerLab, you can \u003ckeywords\u003edesign and customize without any 3D modeling skills\u003c/keywords\u003e. Create a bookmark with your favorite anime characters, or an organizer tailored to your desk, with the perfect spot for sticky notes. Whatever you envision, you can create."},"3":{"sectionTitle":"Maker's Supply","title":"Go-To Source for Parts that Bring 3D Prints to Life","desc":"\u003ckeywords\u003eMaker's Supply provides all the non-3D printed hardware you need for your projects, from motors and LEDs to bolts and magnets\u003c/keywords\u003e. Every pre-tested kit precisely matches the Bill of Materials (BOM) for your chosen MakerWorld project. Just print, assemble, and enjoy!"}}},"9":{"title":"Integrated Ecosystem, End-to-End Support","sections":{"1":{"sectionTitle":"Software Ecosystem","title":"Control \u0026 Browse From Any Device, Anywhere","desc":"\u003ckeywords\u003eBambu Studio, Bambu Handy, and Bambu Suite create a seamless ecosystem, letting you manage and control your printer, and browse MakerWorld content from anywhere, on any device.\u003c/keywords\u003e Our integrated account system links all your activities, so you never have to worry about losing progress when switching devices or locations."},"2":{"sectionTitle":"Bambu Lab Academy","title":"Master Your Printer with Easy-to-follow Lessons","desc":"Whether you're just starting your 3D printing journey or aiming for professional mastery, \u003ckeywords\u003eBambu Academy offers tailored lessons for you and your specific printer model.\u003c/keywords\u003e Our carefully designed curriculum caters to all skill levels, helping you quickly gain knowledge and know-how to make the most of your printer."},"3":{"sectionTitle":"Bambu Lab Wiki","title":"Find Answers to Every Printing Problem","desc":"No matter what problem you encounter, you can find the answer here. From handling nozzle clogging and filament clumping to maintaining worn printer parts, Bambu Lab Wiki offers \u003ckeywords\u003e step-by-step guides with clear instructions and helpful graphics.\u003c/keywords\u003e Whether you're troubleshooting or simply want to understand your printer better, you'll find the detailed guidance here."}}},"video":{"title":"See What You Can Do With 3D Printing"}},"note":{"1":"1. Vision Encoder: Vision Encoder needs to be purchased separately on the Bambu Lab Store.","2":"2. Auto Hole/Contour Compensation: Auto Hole/Contour Compensation must be enabled in Bambu Studio and requires the use of designated Bambu filaments.","3":"3. Filament grinding detection on the DynaSense Extruder may vary depending on filament type.","4":"4. Filter Mode for low-temperature printing is optional and is expected to launch as early as Q1 2026.","5":"5. Permanent Magnet Brush-less Servo Motor.","6":"6. High Flow Hotend are optional equipment and can be purchased from the official store.","7":"7.  When using Bambu Lab PLA Basic to print a 200×200×200 mm cube with 15% infill, the printing time can be reduced by up to 30% compared to Bambu Lab X1C. Actual time savings may vary depending on the model, infill, and filament used.","8":"8. The laser and digital cutting functions are all controlled and visualized through Bambu Suite. Live Spatial Alignment is enabled by the BirdsEye Camera. The BirdsEye Camera comes standard with the H2S Laser Edition, or can be added via the Laser Upgrade Kit.","9":"9. Push notifications require the use of Bambu Handy and cloud connectivity.","10":"10. Due to safety protocol, Developer mode cannot be enabled when using Laser and Cutting functions.","11":"11. Background noise: 40 dB; Test distance: 1 m.","12":"12. The go-kart frame shown in the picture is merely a component of the complete vehicle. Its usability and durability are limited by the overall design and construction of the vehicle. It cannot be used on the road until permission is obtained from the local relevant authorities. When conducting any operations, please strictly abide by the applicable local laws, regulations and safety standards to avoid risks or damages.","13":"13.  Creator projects are provided for illustrative purposes only. Bambu Lab does not endorse, and disclaims any representations or warranties regarding creator projects, including, without limitation, the safety, marketability, or usability of any 3D printed works based on such projects. See our Terms of Service for more information.","14":"14. Ensure that a person must be present at all times to closely monitor the machine during laser engraving and cutting operations. Do not open the laser safety window while the machine is operating. The laser process should only be observed through the designated laser safety window. Individuals with medical conditions or sensitivities (e.g., to strong light or smoke) must strictly follow professional medical advice before operating or approaching the machine.\nFor safety instructions regarding laser use, refer to the Laser Module Safety Guidelines Wiki (https://wiki.bambulab.com/en/h2/manual/imp-info-laser) and the Laser Safety Document (https://wiki.bambulab.com/en/h2/laser-safety-document).","15":"15. All product data for the H2S, such as PMSM extrusion force improvement and model print times, is based on Bambu Lab’s internal testing. Actual results may vary due to individual product differences, user habits, and environmental conditions. Please refer to actual usage for reference.","16":"16. Big thanks to everyone who created these amazing projects: Crimson Shadow, Sword of the Dark Knight, Shadowforged Armor @sarwtin; Pacific Clipper @Rarecho Studio; CyberTrack @CyberBrick™; Truck, Sport Car @SophieBigRat @jinghai; MODCASE HYPER @HaydnBao; Fishcaster-Lite Electric Guitar @user_2955528674 (翻滚吧咸鱼); Storage Toolbox @schuylab; Standard Gridfinity Bin Set @Finneas; Go-Kart @2040085396 (大琢磨); \"Growing Taller\" Small Bag @ricky.svg; Self Watering Seed Starter @Meyui; Small FPV Aircraft @LaoYan FPV; Classic Roadster @21CNCStudio; Pen Holder @yanribing; Folding Wooden Box @woodbear; Round Box @brandon8747; Candy Carrying Tricycle @garagem 167; Floral Keepsake Box @MetaImi; Football Helmet @animuL67; Side Table @AEKI; Mini Catmaw - CyberBrick Edition @polymech3d; The Grand Budapest Hotel @雅杰不加班.","title":"*Footnotes:","richText":"1. Vision Encoder: Vision Encoder needs to be purchased separately on the Bambu Lab Store.\n2. Auto Hole/Contour Compensation: Auto Hole/Contour Compensation must be enabled in Bambu Studio and requires the use of designated Bambu filaments.\n3. Filament grinding detection on the DynaSense Extruder may vary depending on filament type.\n4. Filter Mode for low-temperature printing is optional and is expected to launch as early as Q1 2026.\n5. Permanent Magnet Brush-less Servo Motor.\n6. High Flow Hotend are optional equipment and can be purchased from the official store.\n7.  When using Bambu Lab PLA Basic to print a 200×200×200 mm cube with 15% infill, the printing time can be reduced by up to 30% compared to Bambu Lab X1C. Actual time savings may vary depending on the model, infill, and filament used.\n8. The laser and digital cutting functions are all controlled and visualized through Bambu Suite. Live Spatial Alignment is enabled by the BirdsEye Camera. The BirdsEye Camera comes standard with the H2S Laser Edition, or can be added via the Laser Upgrade Kit.\n9. Push notifications require the use of Bambu Handy and cloud connectivity.\n10. Due to safety protocol, Developer mode cannot be enabled when using Laser and Cutting functions.\n11. Background noise: 40 dB; Test distance: 1 m.\n12. The go-kart frame shown in the picture is merely a component of the complete vehicle. Its usability and durability are limited by the overall design and construction of the vehicle. It cannot be used on the road until permission is obtained from the local relevant authorities. When conducting any operations, please strictly abide by the applicable local laws, regulations and safety standards to avoid risks or damages.\n13.  Creator projects are provided for illustrative purposes only. Bambu Lab does not endorse, and disclaims any representations or warranties regarding creator projects, including, without limitation, the safety, marketability, or usability of any 3D printed works based on such projects. See our Terms of Service for more information.\n14. Ensure that a person must be present at all times to closely monitor the machine during laser engraving and cutting operations. Do not open the laser safety window while the machine is operating. The laser process should only be observed through the designated laser safety window. Individuals with medical conditions or sensitivities (e.g., to strong light or smoke) must strictly follow professional medical advice before operating or approaching the machine.\nFor safety instructions regarding laser use, refer to the Laser Module Safety Guidelines Wiki (https://wiki.bambulab.com/en/h2/manual/imp-info-laser) and the Laser Safety Document (https://wiki.bambulab.com/en/h2/laser-safety-document).\n15. All product data for the H2S, such as PMSM extrusion force improvement and model print times, is based on Bambu Lab’s internal testing. Actual results may vary due to individual product differences, user habits, and environmental conditions. Please refer to actual usage for reference.\n16. Big thanks to everyone who created these amazing projects: Crimson Shadow, Sword of the Dark Knight, Shadowforged Armor @sarwtin; Pacific Clipper @Rarecho Studio; CyberTrack @CyberBrick™; Truck, Sport Car @SophieBigRat @jinghai; MODCASE HYPER @HaydnBao; Fishcaster-Lite Electric Guitar @user_2955528674 (翻滚吧咸鱼); Storage Toolbox @schuylab; Standard Gridfinity Bin Set @Finneas; Go-Kart @2040085396 (大琢磨); \"Growing Taller\" Small Bag @ricky.svg; Self Watering Seed Starter @Meyui; Small FPV Aircraft @LaoYan FPV; Classic Roadster @21CNCStudio; Pen Holder @yanribing; Folding Wooden Box @woodbear; Round Box @brandon8747; Candy Carrying Tricycle @garagem 167; Floral Keepsake Box @MetaImi; Football Helmet @animuL67; Side Table @AEKI; Mini Catmaw - CyberBrick Edition @polymech3d; The Grand Budapest Hotel @雅杰不加班"}},"h2d":{"header":{"overview":"Overview","diveIn":"Dive In","specs":"Specs","faq":"FAQ","buy":"Buy","personalManufacturing":"Personal Manufacturing Hub","accuracy":"Accuracy","dualNozzle":"Dual-Nozzle","intelligence":"Perception Drives Intelligence","bigger":"Bigger \u0026 Better","safety":"Safety","ams":"All-New AMS"},"printer":{"name":"Bambu Lab H2D"},"banner":{"title":"Rethink \nPersonal Manufacturing","buyNow":"Buy now","watchVideo":"Watch video"},"highlight":{"1":{"title":"Revolutionizing Accuracy","desc":"One order of magnitude higher motion accuracy."},"2":{"title":"All-In-One Personal Manufacturing Hub","desc":"Integrated 3D printing, laser engraving/cutting, and  digital cutting/plotting in a unified platform."},"3":{"title":"Dual-Nozzle, Double Flexibility","desc":"Fast and efficient multi-material printing!","author":"3D Printed Shoes by @马黛"},"4":{"title":"AI-Powered Simplicity","desc":"4 computer vision cameras*, 36 sensors, 2 servo motors united by sophisticated algorithm for your simplicity."},"5":{"title":"Next-Gen Filament Management","desc":"Drying, feeding and storage in a single package.","note":"*AMS HT sold separately"}},"gallery":{"1":{"title":"Shoes","author":"3D Printed Shoes - WhaleBerry @CloudBerry"},"2":{"title":"Bionic Butterfly Lamp","author":"Butterfly Lamp @MakerWorld"},"3":{"title":"Bike Saddle","author":"Bike Saddle @八宝"},"4":{"title":"Bike Helmet","author":"Bike Helmet @CloudBerry"},"5":{"title":"Armor Suit","author":"Assassin Armor @寺工"},"6":{"title":"Birthday Card","author":"Birthday Card @Viktor Losev "},"title":"\u003c0\u003eEndless Possibilities of \u003c/0\u003e\u003c1\u003ePersonal Manufacturing\u003c/1\u003e\u003c2\u003e\u003c/2\u003e","processType":{"3DPrinting":"3D Printing","multiMaterial":"Multi-material \n3D Printing","dualColor":"Dual-color \n3D printing","digitalCutting":"Digital \nCutting","laserEngraving":"Laser \nEngraving","laserCutting":"Laser \nCutting"}},"accuracy":{"section":{"1":{"title":"Revolutionizing Accuracy","desc":"With a motion system that is \u003cgreen\u003e 10 times more accurate\u003c/green\u003e, H2D significantly \u003cgreen\u003e reduces the hassle\u003c/green\u003e of tweaking designs and settings to \u003cgreen\u003eaccommodate standard components\u003c/green\u003e or \u003cgreen\u003efitting printed parts\u003c/green\u003e together."},"2":{"sectionTitle":"Our Secret Weapon:Vision Encoder","title":"50µm ultra-fine motion accuracy","desc":"An ultra-accurate vision encoder plate, combined with 5µm resolution optical measurements to track and correct toolhead motion, enables the H2D to achieve consistent and reliable distance-independent 50μm motion accuracy across the entire workspace, one order of magnitude better than its predecessor. (*Vision Encoder sold separately)"},"3":{"sectionTitle":"Auto Hole/Contour Compensation","title":"Perfect fit, first time, every time – no adjustments needed","desc":"Thanks to H2D's enhanced motion accuracy and Bambu Studio's specialized calibration for selected Bambu Lab filaments, you can achieve perfect fits with standard parts like steel shaft every time—no more tedious gap adjustments needed."},"4":{"sectionTitle":"Dual-Nozzle, \u003c25μm Offset","title":"Two nozzles that print like one","desc":"Our state-of-the-art nozzle sensing technology provides fast and reliable calibration, aligning both nozzles before each print. The non-contact measurements are robust and unaffected by nozzle contamination.","media":{"1":"H2D","2":"Competitor"},"text":{"1":"H2D Dual-nozzle ","2":"Others"}}},"more":{"card1":{"sectionTitle":"Nozzle pressure sensing and Active Flow Rate Compensation","title":"Smooth surfaces, sharp edges","desc":"H2D uses both the sensing capability of its servo motor on the extruder and the high-resolution eddy current sensors on the nozzle to precisely control extrusion by measuring nozzle pressure and calibrating PA parameters for each filament, improving surface smoothness and edge sharpness."},"card2":{"sectionTitle":"Active Vibration Compensation","title":"Silky smooth at lightning speed","desc":"To minimize banding artifacts during high-speed printing, H2D employs automatic vibration compensation. Using toolhead sensors, the system recalibrates parameters before each print for consistently smooth and stable results."},"card3":{"sectionTitle":"Floating Damper Feet","title":"Isolate unwanted vibration for better print quality","desc":"The H2D employs floating damper feet with a precisely tuned resonance frequency to effectively decouple the machine from desktop vibrations. This vibration isolation system ensures consistent print quality even in the presence of external vibration sources."}}},"personalManufacturing":{"section":{"1":{"title":"Personal Manufacturing Hub","desc":"H2D is not only a 3D printer, it adds \u003cgreen\u003elaser\u003c/green\u003e engraving and cutting, \u003cgreen\u003edigital cutting and plotting\u003c/green\u003e to your studio, unlocking new creative possibilities."},"2":{"sectionTitle":"Live Spatial Alignment","title":"What-You-See-Is-What-You-Get ","desc":"The H2D’s BirdsEye camera, combined with computer vision algorithms, delivers top-view alignment accuracy up to 0.3mm. This advanced spatial alignment allows users to place the tool path at the right position on the material – truly \"what-you-see-is-what-you-get.\""},"3":{"sectionTitle":"Print-Then-Cut","title":"Make colorful projects with ease","desc":"Instantly transform graphic prints into precise cuts. Design and print with Bambu Suite and your graphic printer, then use the H2D to cut it out. Its AI camera automatically aligns the cutting path to the graphic, ensuring perfect registration with minimal effort."},"4":{"sectionTitle":"Auto Arrangement","title":"Maximize material efficiency, minimize waste","desc":"Leveraging real-time images from the BirdsEye camera, Bambu Suite can automatically arrange your project according to the shape of your material, i.e left over plywood from the previous project. This feature helps you to get the most out of every material.","key":"Arrange"}},"swiper":{"1":{"title":"Laser","desc":"10W and 40W 455nm Laser for engraving \u0026 cutting"},"2":{"title":"Digital Cutting","desc":"Precise cutting on variety of materials"},"3":{"title":"Pen Drawing","desc":"Drawing and writing"},"createdBy":"Model created by {{author}}"},"cardSection":{"1":{"title":"Bye-bye to manual laser focusing and thickness setting","cards":{"1":{"title":"Material CodeSync","desc":"The H2D automatically scans the QR code on your material to load the perfect preset."},"2":{"title":"Full-Auto Calibration","desc":"A single tap initiates automated laser focus verification and material measurement, eliminating manual adjustments."}}},"2":{"title":"A Hard Core Laser Machine","cards":{"1":{"title":"High Power 455nm Laser","desc":"Cut 5mm plywood with the 10W laser, and 15mm plywood with the 40W laser."},"2":{"title":"Air Assist","desc":"Improve surface quality by directing high-speed air to cool the laser path, ensuring cleaner and more precise results."},"3":{"title":"Contact-less 3D Mesh","desc":"Advanced optical height measurement creates a detailed 3D mesh without physical contact, enabling precise laser work on curved surfaces."},"4":{"title":"Rotary Attachment","desc":"Expand your capabilities with the rotary attachment, allowing laser engraving on cylinders, spheres, and rings."},"5":{"title":"Laser Safety Windows","desc":"Operate and monitor laser projects safely without the need for goggles."},"6":{"title":"Air Purifier","desc":"An optional air purifier ensures clean air, even during indoor laser operations."}}}}},"dualNozzle":{"section":{"1":{"title":"Dual-Nozzle Double Flexibility","desc":"Experience the artistry of mechanics and the full potential of \u003cgreen\u003emulti-material printing\u003c/green\u003e with H2D's groundbreaking dual-nozzle switching system.  \u003cgreen\u003eLightweight, precise and reliable\u003c/green\u003e, it enables worry-free material changes, unlocking a world of creative possibilities.","nozzle":{"left":"Left Nozzle","right":"Right Nozzle"}},"2":{"sectionTitle":"Full-Auto Dual-Nozzle Offset Calibration","title":"No manual tuning, no calibration tools","desc":"Experience hassle-free accuracy with eddy current sensing technology, delivering fast, contact-free, and fully automatic dual-nozzle offset calibration. Immune to nozzle debris, this system eliminates the need for manual tools or guides, streamlining your workflow."}},"cardSection":{"1":{"cards":{"1":{"sectionTitle":"Multi-Material Printing","title":"Flexible and rigid, low cost and exotic materials in one print","desc":"Combine flexible and rigid materials in a single print to create impressive interlocking structures and innovative designs beyond traditional manufacturing. Pairing high-performance materials with standard ones further reduces costs and boosts material efficiency by using premium materials only where necessary.","author":"MOCA Pro @thrutheframe "},"2":{"sectionTitle":"Dedicated Support Material","title":"Perfect supports with minimal waste, purging and reloading","desc":"Print with support is no longer a headache. With H2D’s dual-nozzle setup, one nozzle can be reserved for dedicated support material, allowing secured print and perfect support interface.","author":"AirPods Max Case @设计发射塔"},"3":{"sectionTitle":"Efficient Multi-Color Printing","title":"Fast and efficient multi-color printing","desc":"Dual-nozzle printing reduces purge cycles in multi-color prints. H2D's smart algorithms optimize filament use, maximizing dual-nozzle efficiency to save time and materials."}}}}},"intelligence":{"section":{"1":{"title":"Perception Drives Intelligence","desc":"H2D redefines \u003cgreen\u003esensor supremacy\u003c/green\u003e in personal manufacturing. This technological orchestrator integrates a \u003cgreen\u003equad-camera\u003c/green\u003e computer vision system* with an array of \u003cgreen\u003e36 sensors\u003c/green\u003e, all harmonized through our proprietary \u003cgreen\u003eneural algorithm\u003c/green\u003e – delivering \u003cgreen\u003emicron-level measurement\u003c/green\u003e accuracy, self-optimizing calibration protocols, and \u003cgreen\u003ereal-time diagnostic\u003c/green\u003e intelligence."},"2":{"sectionTitle":"Pre-Flight Checklist by AI","title":"Peace of mind, every time you print","desc":"Prior to each operational cycle, H2D's vision system initiates a comprehensive pre-flight checklist: Chamber Integrity Scan – Detects debris across the entire print surface. Hardware Configuration Audit – Instantly identifies nozzle dimensions and build plate properties."},"3":{"sectionTitle":"DynaSense Extruder","title":"Intelligent sensing for precise extrusion control","desc":"Bambu Lab's proprietary PMSM servo architecture establishes an intelligent extrusion governance system. It executes 20kHz Torque/Resistance and position sampling to dynamically modulate electromagnetic torque vectors. Stabilizing extrusion and detecting filament grinding and clogging. "},"4":{"sectionTitle":"SOTA Filament Monitoring","title":"Intelligent sensing for precise extrusion control","desc":"Bambu Lab's proprietary PMSM servo architecture establishes an intelligent extrusion governance system. It executes 20kHz Torque/Resistance and position sampling to dynamically modulate electromagnetic torque vectors. Stabilizing extrusion and detecting filament grinding and clogging. "},"5":{"sectionTitle":"SOTA Filament Monitoring","title":"15 sensors on one filament path","desc":"Unlike legacy systems with single filament run-out detectors, the H2D features comprehensive material flow monitoring. Throughout the AMS-to-nozzle path, 15 strategic sensors form an intelligent network, continuously tracking five key parameters: feeding velocity, tension, filament tip location, extruder thermal environment, and dynamic extrusion pressure. This establishes an industry-leading filament behavior control system."},"6":{"sectionTitle":"Health Management System 2.0","title":"Full support from start to finish","desc":"The HMS system uses sensors and cameras to pinpoint printing issues with advanced logic, similar to car diagnostics codes. It provides clear, detailed troubleshooting guidance, allowing you to quickly resolve problems and get back to your creative work."}},"expandVideoSection":{"sectionTitle":"Nozzle Camera","title":"Monitor extrusion at the nozzle tip","desc":"The H2D features an AI-backed nozzle camera with macro lens. This intelligent monitoring system continuously tracks extrusion patterns, immediately detecting material accumulation, filament deviations, and extrusion failures.","videoLabel1":"Nozzle Clumping","videoLabel2":"Air Printing","videoLabel3":"Spaghetti"}},"bigger":{"section":{"1":{"title":"Bigger, Faster, Better","desc":"The H2D delivers an \u003cgreen\u003eexpanded build volume, faster speeds\u003c/green\u003e, and enhanced capability to work with \u003cgreen\u003ehigh-performance materials\u003c/green\u003e. It opens up new creative opportunities while broadening your material options, empowering you to take your projects to the next level."},"2":{"sectionTitle":"King-Size Work Zone","title":"Break free from size constraints","desc":"With a print volume up to 350mm×320mm×325mm*, creating large-scale projects has never been easier! From laser engraving on sizable objects to printing oversized models, the expanded capacity empowers you to bring even your most ambitious ideas to life.","media":{"1":"Max","2":"Single-nozzle","3":"Dual-nozzle"}},"3":{"sectionTitle":"350°C Hotend \u0026 65°C Chamber Heating","title":"Unleash the full potential of high-performance materials","desc":"Equipped with 65°C active chamber heating and a high-temperature hotend reaching up to 350°C, the H2D delivers precise closed-loop temperature control. This advanced system effectively eliminates warping and deformation in high-performance materials, ensuring superior layer bonding and maximizing their full potential.","media":{"1":"High-temp Hotend","2":"Chamber Heating"}},"4":{"sectionTitle":"REAL High-Flow Hotend","title":"Consistently print at 600mm/s","desc":"The H2D’s purpose-built high-flow hotend ensures reliable, high-speed printing at 600mm/s. Designed for consistent performance, it eliminates mid-print flowrate restrictions, enabling uninterrupted high-speed printing regardless of the print size or complexity."}},"more":{"card1":{"sectionTitle":"Hardened Steel Extruder and Nozzle","title":"Reliable for fiber-reinforced material printing","desc":"H2D’s extrusion system and nozzle are crafted from hardened steel, offering exceptional durability and wear resistance. Designed specifically for stable, long-term printing of high-performance fiber-reinforced materials."},"card2":{"sectionTitle":"Full-Metal Frame \u0026 Die-cast Chassis","title":"Solid for high-speed \u0026 accuracy","desc":"The integrated die-cast aluminum alloy chassis offers a sturdy and stable structure, provides rigid foundation for high-speed, large-format printing while minimizing accuracy loss due to micro-twisting. "},"card3":{"sectionTitle":"Quick-Swap Nozzle","title":"Nozzle change with 1-clip","desc":"Achieve truly tool-free, hassle-free hotend replacement with a simple lock clip – easy to operate, quick, and convenient without the need to unplug wires."}}},"safety":{"chapter":{"title":"Safety, Checked!","desc":"H2D's \u003cgreen\u003eupgraded safety\u003c/green\u003e design enhances user confidence. Utilizing internal sensors, it provides sensitive \u003cgreen\u003eactive protection, preventing potential issues\u003c/green\u003e. The specialized \u003cgreen\u003eair circulation\u003c/green\u003e and \u003cgreen\u003elaser safety\u003c/green\u003e systems ensure optimal safety and a superior operating environment in \u003cgreen\u003eall conditions\u003c/green\u003e."},"section":{"1":{"title":"Laser Protection","desc":"The H2D Laser Edition comes standard with laser safety windows designed to enhance the safety of user observing laser operation. Additionally, doors are equipped with sensor that trigger and emergency stop if opened during laser operation."},"2":{"title":"Emergency Stop \u0026 Loud Buzzer","desc":"H2D Laser Edition is equipped with an emergency stop and audible alarm, designed to help users quickly identify safety issues and easily pause the machine's operation."},"3":{"title":"Flame-Retardant Chamber","desc":"The H2D features flame-retardant material through the chamber designed to provide passive fire safety protection."},"4":{"title":"Flame Sensor","desc":"The H2D chamber is equipped with flame sensors that are designed to quickly detect fire. In the event a fire is detected, the H2D unit can sound a buzzer, and can be configured to send push notifications to help minimize potential risks."},"5":{"title":"Auto Fire Extinguishing System","desc":"An optional CO2 fire extinguisher system is available, which can be activated by the flame sensor in order to more quickly extinguish fire, adding extra peace of mind."},"6":{"title":"Multi-Sensor Closed-loop Temperature Control","desc":"H2D features a closed-loop temperature control system for all heating components, constantly adjusting temperatures based on real-time sensor data. This ensures stable and precise thermal management, keeping the device running efficiently and consistently within optimal temperature ranges."},"7":{"title":"Adaptive Airflow","desc":"Utilizing three mode-switch air flaps and chamber intake/exhaust, H2D's Adaptive Airflow system delivers versatile air management for diverse operational needs. The system intelligently transitions between internal and external circulation, and provides selectable air filtration or heating, resolving challenges such as laser processing odors and dust, 3D printing fume filtration and chamber temperature control, offering a custom air quality solution for your personal manufacturing hub."},"8":{"title":"Seamless Cloud Connectivity \u0026 Off-The-Grid Isolation, For You to Choose","desc":"The H2D offers convenient \u003cgreen\u003ecloud connectivity\u003c/green\u003e for remote control from \u003cgreen\u003eany device\u003c/green\u003e. For \u003cgreen\u003esecurity-sensitive\u003c/green\u003e applications, it also provides full \u003cgreen\u003eoffline functionality\u003c/green\u003e, ensuring \u003cgreen\u003ephysically isolated\u003c/green\u003e security. Users can \u003cgreen\u003econtrol the printer, send files, and upgrade firmware\u003c/green\u003e without an internet connection. Additionally, \u003cgreen\u003eDeveloper Mode\u003c/green\u003e enables MQTT port access for tinkerers who wish to integrate \u003cgreen\u003ethird-party\u003c/green\u003e components and software."}}},"ams":{"section":{"1":{"title":"AMS, Evolved.","desc":"The all-new \u003cgreen\u003e2nd-generation\u003c/green\u003e AMS systems, including the \u003cgreen\u003eAMS 2 Pro\u003c/green\u003e and \u003cgreen\u003eAMS HT\u003c/green\u003e, feature brushless servo feeding motors that significantly boost filament \u003cgreen\u003efeeding efficiency\u003c/green\u003e, accelerating multi-color and multi-material printing. Even better, the 2nd-generation AMS introduces a \u003cgreen\u003efilament drying\u003c/green\u003e function with \u003cgreen\u003eactive air vent\u003c/green\u003e on a fully sealed system, greatly enhancing \u003cgreen\u003edrying efficiency\u003c/green\u003e and maintaining \u003cgreen\u003eoptimal filament conditions\u003c/green\u003e for extended periods.","card":{"1":{"sectionTitle":"Rethink Personal Manufacturing","title":"Bambu Lab AMS 2 Pro","buttonText":"Learn More"},"2":{"sectionTitle":"Rethink Personal Manufacturing","title":"Bambu Lab AMS HT","buttonText":"Learn More"}}},"2":{"title":"Why You Need an All-In-One Manufacturing Hub? ","card":{"1":{"sectionTitle":"Accurate temperature and humidity sensor for clearer readings","title":"Unlock new creative possibilities with hybrid processes"},"2":{"sectionTitle":"Space Saving","title":"Space-saving all-in-one machine: Reclaim your workspace"},"3":{"sectionTitle":"More Bang-for-the-buck","title":"One machine, the value of four"}}},"3":{"title":"Dry Filament Quickly and Intelligently","section":{"1":{"sectionTitle":"Electro-Magnetic Air Vent","title":"Automated venting facilitates dehumidification during drying and airtight sealing for weeks of quality printing."},"2":{"sectionTitle":"Auto-Rotate Drying","title":"During the drying process, the filament spools rotate automatically to provide more even drying."},"3":{"sectionTitle":"RFID Sync","title":"AMS 2 Pro uses RFID to auto-match drying settings for Bambu official filaments, no manual input needed."}}},"4":{"title":"Speed Up! Faster Multi-Material Printing!","cards":{"1":{"title":"Powerful Bambu permanent magnet synchronous servo motor sped-up the filament feeding by 60%"},"2":{"title":"Average 10min saved per 100 filament changes"},"3":{"title":"Faster multi-color printing"}}},"5":{"title":"Evolved, Polished Design Details","section":{"1":{"sectionTitle":"Tool-Free Filament Tubes Access","title":"Removing snapped filament from the first-gen AMS requires extracting all spools and disassembling the shell with two screws, taking 3-5 minutes. In contrast, the AMS 2 Pro offers direct, tool-free access to filament tubes from the top."},"2":{"sectionTitle":"Ceramic Inlet","title":"Ceramic filament inlets with Vickers hardness of 1200 significantly enhances durability."},"3":{"sectionTitle":"Direct Drive Feeding","title":"Brushless motor drives the feeding directly, eliminating gear noise"},"4":{"sectionTitle":"Accurate Temp Sensor","title":"Accurate temperature and humidity sensor for clearer readings"}}}}},"priceContent":{"title":"Bambu Lab H2D","desc":"Rethink \nPersonal Manufacturing","buttonText":"Buy Now"},"note":{"1":"3D mesh feature will be available shortly after the product release through firmware update. ","2":"Rotary Attachment is an optional equipment will be available soon, buy at official store.","3":"Air Purifier is an optional equipment, buy at official store.","4":"BirdsEye camera is only equipped with H2D laser edition, or can be added with laser upgrade kit.","5":"Material CodeSync only works with Bambu official materials.","6":"The optional Vision Encoder is required for Motion Accuracy Enhancement.","7":"Auto Holes-contour Compensation must be enabled in Bambu Studio, and designated Bambu filament must be used.","8":"350mm×320mm×325mm print volume is enable by using identical filaments in both nozzles and print with both nozzles.","9":"High-flow Hotends are optional equipments, buy at official store.","10":"Auto Fire Extinguisher is an optional equipment, will be available soon after the product release.","11":"Due to safety protocol, Developer mode cannot be enabled when using Laser and Cutting functions.","12":"Big thanks to everyone who created these amazing projects.: Automata by @Ross McSweeney; Hand Bag by @file4lase
